<!doctype html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maximal — Dashboard</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23c8334a'/%3E%3Ctext x='50%25' y='54%25' dy='.35em' text-anchor='middle' font-family='Georgia,serif' font-style='italic' font-size='42' font-weight='700' fill='%23fafafa'%3Em%3C/text%3E%3C/svg%3E"
    />

    <!-- Commissioner is the body face, matching the Settings window.
         The Dashboard has no display heading (the native titlebar
         carries the page name), so Fraunces is intentionally absent —
         "Fraunces rationed" per .design-context.md. Production should
         self-host; the prototype link is acceptable. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Commissioner:wght@200..900&display=swap"
    />

    <script src="/vendor/tailwind.min.js"></script>
    <script src="/vendor/lucide.min.js"></script>

    <link rel="stylesheet" href="/usage-viewer.css" />
    <script src="/usage-viewer.js" defer></script>
  </head>
  <body class="antialiased">
    <div id="app" class="min-h-screen p-4 sm:p-6">
      <div class="max-w-7xl mx-auto">
        <!-- Native macOS titlebar already reads "Maximal — Dashboard";
             no in-window duplicate. Content starts at the control row. -->

        <!-- Period selector. Data refreshes automatically — Tauri
             webviews subscribe to a Channel<TokenUsageEvent> driven by
             the shell; plain-browser viewers poll on a timer. No
             Fetch button. -->
        <div class="mb-6 flex items-center gap-3">
          <span
            id="token-usage-period-label"
            class="text-sm"
            style="color: var(--text-muted); font-weight: var(--weight-md);"
            >Period</span
          >
          <div
            id="token-usage-period"
            class="segmented"
            role="group"
            aria-labelledby="token-usage-period-label"
          >
            <button
              type="button"
              class="segmented-option"
              data-period="day"
              aria-pressed="true"
            >1 day</button>
            <button
              type="button"
              class="segmented-option"
              data-period="week"
              aria-pressed="false"
            >7 days</button>
            <button
              type="button"
              class="segmented-option"
              data-period="month"
              aria-pressed="false"
            >30 days</button>
          </div>
        </div>

        <!-- Content area for dynamically rendered data. -->
        <main id="content-area"></main>
      </div>
    </div>
  </body>
</html>
