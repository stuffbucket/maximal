<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Attention variant: normal glyph + accent-colored dot in the upper-
    right corner. Mirrors macOS badge conventions. Accent #c8334a is the
    maximal brand; the dot uses a slightly lighter ring to keep contrast
    against dark menubars without losing brand identity.
  -->
  <rect x="6" y="6" width="52" height="52" rx="12" ry="12" fill="#c8334a"/>
  <text x="32" y="48"
        font-family="-apple-system, Helvetica, sans-serif"
        font-weight="900"
        font-size="44"
        fill="#f4ead4"
        text-anchor="middle">m</text>
  <circle cx="50" cy="14" r="10" fill="#f4ead4"/>
  <circle cx="50" cy="14" r="7" fill="#c8334a"/>
</svg>
