<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!--
    Tray icon — normal (RunningAuthenticated) state.
    ViewBox sized in points (22×22) to match macOS HIG menu-bar
    geometry. PNGs are rendered at 22 (1x) and 44 (2x) so AppKit
    downsamples cleanly at the native menu-bar height.
    Stays full-color on purpose: macOS template-image behavior is
    opt-in via a special NSImage suffix Tauri doesn't expose, so we
    ship a colored asset and let the OS handle dark/light backgrounds.
  -->
  <rect x="1" y="1" width="20" height="20" rx="5" ry="5" fill="#c8334a"/>
  <text x="11" y="16.5"
        font-family="-apple-system, Helvetica, sans-serif"
        font-weight="900"
        font-size="16"
        fill="#ffffff"
        text-anchor="middle">m</text>
</svg>
