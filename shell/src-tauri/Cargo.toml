[package]
name = "shell"
version = "0.1.0"
description = "Maximal tray + dashboard"
authors = ["stuffbucket"]
edition = "2021"

[lib]
name = "shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# `tray-icon` feature gives us TrayIconBuilder; default features bring
# in the menu/window APIs we use below.
tauri = { version = "2", features = ["tray-icon", "macos-private-api"] }
tauri-plugin-opener = "2"
# `tauri-plugin-shell` provides the sidecar spawn API that uses the
# arch-suffixed binaries declared in bundle.externalBin.
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1.0.102"
