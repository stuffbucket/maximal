<!doctype html>
<!--
  Pre-boot splash. Shown the instant the tray app launches, before the
  sidecar proxy is reachable — immediate, visible feedback that an
  otherwise menu-bar-only app started.

  SELF-CONTAINED on purpose: all CSS/JS is inline and the "maximal"
  wordmark is an inlined, font-OUTLINED SVG (generated by
  shell/tools/gen-wordmark.py from the Fraunces variable font at
  opsz 16 / heavy / wonky — the brand H1 display cut). Outlining means
  the wordmark always renders as real Fraunces with zero font-loading
  dependency, even at first paint before any network/font is available.

  Raw brand values are inlined (no reliable stylesheet link at boot);
  they MIRROR shell/src/tokens.css — keep in sync.

  Lifecycle: Rust (shell/src-tauri/src/lib.rs) creates this window on
  launch, emits `splash:ready` when the sidecar goes healthy, then closes
  it. The script swaps copy + fades on that event; Rust closes the window
  regardless, so a missed event never strands it.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Maximal</title>
    <style>
      :root {
        --font-body: "Commissioner", "Segoe UI", Helvetica, Arial, sans-serif;
        --brand: #c8334a;     /* mirrors tokens.css --brand */
        --cream: #f0e9d6;     /* brand cream wordmark/text on red */
      }
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        user-select: none;
        cursor: default;
        overflow: hidden;
      }
      .splash {
        box-sizing: border-box;
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        /* Optically-weighted frame: a touch more bottom than top so the
           heavy wordmark sits visually centered, generous side margins. */
        padding: 34px 44px 40px;
        background: var(--brand);
        border-radius: 14px;
        text-align: center;
        opacity: 1;
        transition: opacity 200ms ease-out;
      }
      .splash.is-leaving { opacity: 0; }

      /* The outlined Fraunces wordmark — the hero. currentColor → cream. */
      .wordmark {
        display: block;
        width: 100%;
        max-width: 340px;
        height: auto;
        color: var(--cream);
      }

      .status {
        font-family: var(--font-body);
        /* Standard App ramp --text-base: 16px / --weight-base 400 /
           --leading-base 1.6 (mirrors tokens.css). */
        font-weight: 400;
        font-size: 16px;
        line-height: 1.6;
        color: var(--cream);
        opacity: 0.82;
        min-height: 1.6em;
      }

      @media (prefers-reduced-motion: reduce) {
        .splash { transition: opacity 60ms linear; }
      }
    </style>
  </head>
