# Two services:
#   proxy  — caozhiyuan/copilot-api, talking to GHC Enterprise
#   claude — Claude Code in a clean container, env-only auth, talks to proxy
#
# One-time setup — run device flow once on the host, OR inside the
# container with the auth volume mounted:
#
#   # On the host (fastest):
#   bun install && bun run ./src/main.ts auth --verbose
#
#   # Or, in the container — no host bun needed:
#   docker compose run --rm --entrypoint "bun run dist/main.js auth --verbose" proxy
#
# Either way the token lands at ~/.local/share/copilot-api/github_token on
# the host, which the compose mounts read-only into the proxy container.
#
# Bring up the proxy:
#   docker compose up -d proxy
#
# Run Claude Code interactively against the proxy (mounts $PWD as /work):
#   docker compose run --rm claude

services:
  proxy:
    build: .
    image: maximal-proxy:dev
    container_name: maximal-proxy
    restart: unless-stopped
    ports:
      - "4141:4141"
    environment:
      NODE_ENV: production
    # Override caozhiyuan's entrypoint so it reads the cached token from
    # disk (mounted below) instead of taking it via -g $GH_TOKEN.
    entrypoint: ["bun", "run", "dist/main.js"]
    command: ["start", "--account-type", "enterprise", "--port", "4141"]
    volumes:
      - ${HOME}/.local/share/copilot-api:/root/.local/share/copilot-api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4141/"]
      interval: 30s
      timeout: 5s
      retries: 3

  claude:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: maximal-claude:dev
    profiles: ["interactive"]
    depends_on:
      proxy:
        condition: service_healthy
    environment:
      ANTHROPIC_BASE_URL: http://proxy:4141
      ANTHROPIC_AUTH_TOKEN: anything
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4.5}
    volumes:
      - ${PWD}:/work
    working_dir: /work
    stdin_open: true
    tty: true
