# Vendored replacement for softprops/action-gh-release@v2.
#
# Internal MS GitHub Actions environments reject non-MS/GitHub-sourced
# actions. The `gh` CLI is preinstalled on every GitHub-hosted runner
# (and in MS-managed runner images), so a thin composite that shells
# out to `gh release upload` covers our use case without external deps.
#
# Functional surface is the subset of softprops/action-gh-release we
# actually use:
#   - attach files to an existing release identified by a tag
#   - clobber existing assets with the same name (re-runs of a release)
#
# This action does NOT create the release itself — `bunx changelogithub`
# in release.yml does that. Run this only after the release exists.

name: Upload Release Asset
description: Attach files to an existing GitHub Release via the gh CLI

inputs:
  tag:
    description: Tag name of the existing release (e.g. `v1.9.4`, or pass github.ref_name from the caller workflow).
    required: true
  files:
    description: |
      Newline-separated list of file paths to upload. Each path is
      shell-globbed; missing paths fail the step.
    required: true

runs:
  using: composite
  steps:
    - name: Upload assets
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        TAG: ${{ inputs.tag }}
        FILES: ${{ inputs.files }}
      run: |
        set -euo pipefail
        if [ -z "$FILES" ]; then
          echo "::error::No files provided to upload-release-asset"
          exit 1
        fi

        # Use the REST API directly via curl. Avoids depending on the
        # `gh` CLI being installed on every runner (the self-hosted
        # Mac runner doesn't ship it). while-read instead of mapfile
        # so this works on macOS's bash 3.2.
        ASSETS=()
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          # shellcheck disable=SC2206 -- intentional glob expansion
          expanded=( $line )
          for f in "${expanded[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::File not found: $f"
              exit 1
            fi
            ASSETS+=("$f")
          done
        done <<<"$FILES"
        echo "Uploading ${#ASSETS[@]} asset(s) to release $TAG"

        # Resolve release id + existing assets (one API call).
        REL_JSON=$(curl -fsSL \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GH_REPO}/releases/tags/${TAG}")

        REL_ID=$(printf '%s' "$REL_JSON" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
        if [ -z "$REL_ID" ]; then
          echo "::error::Could not resolve release id for tag ${TAG}"
          exit 1
        fi

        upload_one() {
          local file="$1"
          local name
          name=$(basename "$file")
          local mime
          case "$name" in
            *.zip)    mime="application/zip" ;;
            *.dmg)    mime="application/x-apple-diskimage" ;;
            *.msi)    mime="application/x-msi" ;;
            *.tar.gz) mime="application/gzip" ;;
            *.sha256) mime="text/plain" ;;
            *.ps1)    mime="text/plain" ;;
            *)        mime="application/octet-stream" ;;
          esac

          # Clobber: if an asset with the same name already exists,
          # delete it before uploading. ID lives in REL_JSON.
          local existing_id
          existing_id=$(printf '%s' "$REL_JSON" | python3 -c "
import sys, json
r = json.load(sys.stdin)
n = sys.argv[1]
ids = [str(a['id']) for a in r.get('assets', []) if a['name'] == n]
print(ids[0] if ids else '')
" "$name")

          if [ -n "$existing_id" ]; then
            echo "  replacing existing asset id=$existing_id ($name)"
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GH_REPO}/releases/assets/${existing_id}"
          fi

          echo "  uploading $name ($(wc -c < "$file" | tr -d ' ') bytes, $mime)"
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: $mime" \
            --data-binary @"$file" \
            "https://uploads.github.com/repos/${GH_REPO}/releases/${REL_ID}/assets?name=${name}" \
            > /dev/null
        }

        for f in "${ASSETS[@]}"; do
          upload_one "$f"
          # Re-fetch release JSON after each upload so subsequent
          # clobber-checks see the latest asset list.
          REL_JSON=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/releases/${REL_ID}")
        done

        echo "Done."
