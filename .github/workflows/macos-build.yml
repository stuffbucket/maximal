# macOS signed build — MANUAL dispatcher / recovery tool.
#
# WHAT THIS DOES
#   Triggers the build.yml workflow in the PRIVATE builder repo
#   (stuffbucket/macos-builder), which owns the only self-hosted macOS runner
#   and all Apple signing secrets. The builder checks THIS repo out at the tag,
#   runs this repo's .macos-builder/{config,build.sh}, signs + notarizes, and
#   uploads the signed .dmg (+ .dmg.sha256) onto THIS release.
#
# WHY workflow_dispatch ONLY (no `release: published`)
#   The normal release path builds the macOS .dmg as the `macos-dmg` JOB in
#   release.yml and gates `publish` on it, so the .dmg is attached while the
#   release is still a DRAFT (mutable) and lands inside the single
#   draft→published flip. With GitHub immutable releases ON, attaching an asset
#   AFTER publish is rejected (HTTP 422) — so an on-`published` trigger would
#   always fail. This workflow stays only as a manual re-build for a release
#   that is STILL A DRAFT (or for builder debugging).
#
# REQUIREMENTS (one-time, per client repo)
#   - app-repoman installed on THIS repo with Contents: read+write.
#   - Secret MACOS_BUILDER_PAT — fine-grained PAT, Actions: write on
#     stuffbucket/macos-builder ONLY (its sole power is to start the build).
#   - .macos-builder/config (required) + .macos-builder/build.sh (the producer).

name: macOS signed build (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build, e.g. v1.2.3"
        required: true
        type: string

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build on stuffbucket/macos-builder
        env:
          GH_TOKEN: ${{ secrets.MACOS_BUILDER_PAT }}
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${TAG}" ]; then
            echo "::error::No tag provided." >&2
            exit 1
          fi
          echo "Triggering macOS build for ${REPO} at ${TAG}"
          gh workflow run build.yml \
            --repo stuffbucket/macos-builder \
            --ref main \
            -f "repo=${REPO}" \
            -f "ref=${TAG}"
          echo "Triggered. The signed dmg will appear on the ${TAG} release shortly."
