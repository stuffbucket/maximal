name: Release Please

# Automates the version-bump / changelog / tag dance that used to be a
# manual `bun run release` (bumpp) + hand-pushed tag. The flow is:
#
#   1. Commits land on main (conventional commits).
#   2. This workflow opens / updates a "release PR" that bumps
#      package.json `version` and regenerates CHANGELOG.md from those
#      commits. The PR sits open, accumulating changes, until a
#      maintainer merges it.
#   3. On merge of that release PR, this workflow's `github-release`
#      step creates the git tag `vX.Y.Z` (and a matching GitHub
#      Release carrying the CHANGELOG notes).
#   4. The tag push fires release.yml, which builds + signs + verifies
#      every installer against a DRAFT, then publishes. release.yml's
#      `release` job ADOPTS the release this workflow created (flips it
#      back to draft and reuses it) rather than creating a competing
#      one — see the "Generate GitHub Release notes (draft)" step there.
#
# DIVISION OF RESPONSIBILITY
#   release-please (here):  the release PR (version bump + CHANGELOG),
#                           and on merge the git TAG + a GitHub Release
#                           record seeded with CHANGELOG notes.
#   release.yml:            fires on the tag, builds/signs/verifies all
#                           assets on the (re-)drafted release, publishes.
#
# TRIGGER CHAIN / TOKEN
#   GitHub suppresses workflow triggers for refs pushed via the default
#   GITHUB_TOKEN (the anti-loop guard release.yml documents at its top).
#   So if `github-release` tagged with GITHUB_TOKEN, release.yml's
#   `on: push: tags: v*` would NOT fire and the release would sit as an
#   empty draft forever. To make the tag re-trigger release.yml we mint a
#   short-lived installation token from the **app-repoman** GitHub App
#   (first-party actions/create-github-app-token) and run release-please
#   with it — a tag pushed by an App token is a "real" push that fans out
#   to other workflows, same as a PAT but without a long-lived personal
#   token to manage.
#
#   One-time setup (maintainer):
#     1. Install app-repoman on this repo with Contents: Read & write
#        and Pull requests: Read & write.
#     2. REPOMAN_APP_ID (repo variable OR secret) = the app's App ID.
#     3. Repo secret     REPOMAN_APP_PRIVATE_KEY = the app's PEM private key.
#   If REPOMAN_APP_ID is unset we fall back to GITHUB_TOKEN and warn: the
#   release PR + tag still get created, but a maintainer must kick
#   release.yml by hand (workflow_dispatch with the tag selected under
#   "Use workflow from").

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN scopes for the fallback path (no app token). The
# app-repoman token, when minted, carries its own installation scopes.
permissions:
  contents: write
  pull-requests: write

# One release-please run per branch. Never cancel in-flight: a run that
# is mid-tag-creation must finish, not be interrupted by the next push
# to main.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      # The App ID can live as a repo VARIABLE (idiomatic — it isn't
      # secret) or a SECRET; support either. The `secrets` context can't
      # be used in an `if:`, so resolve the id into a step output first
      # (without echoing it) and gate the mint on that.
      - name: Resolve app id
        id: appid
        env:
          APP_ID: ${{ vars.REPOMAN_APP_ID || secrets.REPOMAN_APP_ID }}
        run: |
          set -euo pipefail
          if [ -n "${APP_ID:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      # Mint a short-lived app-repoman installation token so the tag push
      # re-triggers release.yml. Skipped when no App ID is set → the steps
      # below fall back to github.token (see the header note). The action's
      # `token` output is auto-registered as a secret (masked in logs).
      - name: Mint app-repoman token
        id: app-token
        if: steps.appid.outputs.present == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.REPOMAN_APP_ID || secrets.REPOMAN_APP_ID }}
          private-key: ${{ secrets.REPOMAN_APP_PRIVATE_KEY }}

      - name: Note token source
        run: |
          set -euo pipefail
          if [ "${{ steps.appid.outputs.present }}" = "true" ]; then
            echo "Using app-repoman token — the tag push will re-trigger release.yml."
          else
            echo "::warning::No REPOMAN_APP_ID (variable or secret) set — falling back to GITHUB_TOKEN."
            echo "::warning::A tag pushed via GITHUB_TOKEN will NOT fire release.yml (anti-loop guard)."
            echo "::warning::After the release PR merges, start release.yml manually: Run workflow, selecting the new vX.Y.Z tag under 'Use workflow from'."
          fi

      # Open or update the release PR (version bump + CHANGELOG).
      - name: release-please release-pr
        env:
          RP_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          bunx release-please release-pr \
            --token "$RP_TOKEN" \
            --repo-url "${{ github.repository }}" \
            --target-branch "${{ github.ref_name }}" \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json

      # On merge of the release PR, create the tag + GitHub Release.
      # A no-op (exits 0) when the latest commit is not a merged
      # release PR, so it is safe to run on every push to main.
      - name: release-please github-release
        env:
          RP_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          bunx release-please github-release \
            --token "$RP_TOKEN" \
            --repo-url "${{ github.repository }}" \
            --target-branch "${{ github.ref_name }}" \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json
