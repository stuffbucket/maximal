# Reusable workflow: build + sign + notarize the macOS Tauri menu-bar
# bundle and attach it to an existing release. Called by release.yml via
# `uses: ./.github/workflows/tauri-macos.yml` with `needs: binaries`, so
# `publish` gates on it through the normal job graph — no cross-workflow
# dispatch, no asset polling. The self-hosted macOS runner is the reason
# this is a separate (reusable) workflow rather than a job in release.yml;
# workflow_call from the same repo can target self-hosted runners.
#
# Distribution: a single signed + notarized + stapled .dmg. Per Apple's
# docs, notarizing the .dmg also notarizes the .app (and the sidecar)
# inside it — "the notary service generates a ticket for the top-level
# file … as well as for each nested file" — so a separate .app notarize/
# staple and a standalone .app.zip aren't needed for drag-to-Applications
# distribution.
#
# Signing is inside-out: the Bun sidecar is signed BEFORE `tauri build`
# bundles it (so the inner binary carries its own Developer ID + hardened
# runtime signature wherever Tauri places it), then the .app is signed
# WITHOUT `--deep` (deprecated; it skips Contents/Resources and would
# overwrite the sidecar's entitlements).
#
# Required repo secrets (passed via `secrets: inherit` from the caller):
#   KEYCHAIN_PASSWORD, DEVELOPER_ID_APPLICATION,
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#
# Asset-reuse toggle: set the repo variable RELEASE_REUSE_EXISTING_ASSETS=true
# to reuse an already-attached .dmg for faster debug re-runs. Unset or any
# other value rebuilds from the tag commit (the default).

name: Tauri macOS bundle

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag the bundle is built for and attached to (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  tauri-macos:
    name: macOS Tauri .dmg (signed + notarized, arm64)
    runs-on: self-hosted
    env:
      TAG: ${{ inputs.tag }}
      ARCH: arm64
      # GH Actions on self-hosted runs non-login shells that don't read
      # ~/.zshrc — make bun + cargo discoverable for every step.
      BUN_INSTALL: /Users/build/.bun
      CARGO_HOME: /Users/build/.cargo
    steps:
      - uses: actions/checkout@v6

      # Asset-reuse gate (OPT-IN). The macOS bundle is a 60–200 MB Tauri
      # build plus Apple notarization — minutes of work we can skip when
      # the signed .dmg is already attached. But reuse is opt-in: it only
      # skips when the repo variable RELEASE_REUSE_EXISTING_ASSETS is
      # exactly 'true' AND the .dmg is present. Default (variable unset) =>
      # never skips => always rebuilds from the tag commit, so a tag re-run
      # never silently ships a stale bundle. Set the variable to 'true' for
      # fast debug re-runs. Presence is keyed off the asset itself, not a
      # prior run's exit status.
      - name: Skip if installer already attached
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
          REUSE: ${{ vars.RELEASE_REUSE_EXISTING_ASSETS }}
        run: |
          set -euo pipefail
          DMG="maximal-${TAG}-darwin-${ARCH}.dmg"
          if [ "${REUSE:-}" != "true" ]; then
            echo "RELEASE_REUSE_EXISTING_ASSETS not 'true' — building from tag commit."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
          if grep -Fxq "$DMG" <<<"$ASSETS"; then
            echo "Reuse enabled and $DMG already attached to $TAG — skipping build + upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Reuse enabled but $DMG not present on $TAG — building."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve names + stamp version into tauri.conf.json
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          VERSION="${TAG#v}"
          DMG="maximal-${TAG}-darwin-${{ env.ARCH }}.dmg"
          {
            echo "VERSION=${VERSION}"
            echo "DMG=${DMG}"
          } >> "$GITHUB_ENV"

          # Tauri reads version from tauri.conf.json, not git tags. Stamp it.
          /usr/bin/sed -i '' -e "s/\"version\": \"0\\.0\\.0\"/\"version\": \"${VERSION}\"/" \
            shell/src-tauri/tauri.conf.json
          grep '"version"' shell/src-tauri/tauri.conf.json

      - name: Install JS deps
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          bun install
          bun install --cwd shell

      - name: Build sidecar (Bun-compiled proxy)
        if: steps.skip.outputs.skip != 'true'
        env:
          MAXIMAL_FORCE_SIDECAR: "1"
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          bun run app:sidecar
          ls -la shell/src-tauri/binaries/

      - name: Unlock signing keychain
        if: steps.skip.outputs.skip != 'true'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$HOME/Library/Keychains/maximal.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC"

      # Sign the Bun sidecar BEFORE `tauri build` bundles it. Bun stamps a
      # linker-only signature the notary rejects — strip it, then sign with
      # a Developer ID + hardened runtime and the same entitlements the app
      # uses (JIT / unsigned executable memory / library validation, which
      # the Bun runtime needs). Doing it here, inside-out, means the inner
      # binary is correctly signed regardless of where Tauri places it —
      # the reason we no longer rely on `codesign --deep` after bundling.
      - name: Pre-sign sidecar (inside-out, hardened runtime)
        if: steps.skip.outputs.skip != 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          signed=0
          for SIDECAR in shell/src-tauri/binaries/maximal-*; do
            [ -f "$SIDECAR" ] || continue
            echo "Pre-signing sidecar: $SIDECAR"
            codesign --remove-signature "$SIDECAR" 2>/dev/null || true
            codesign --force --options runtime --timestamp \
              --identifier co.stuffbucket.maximal.proxy \
              --entitlements build/macos/maximal.entitlements \
              --sign "$SIGN_IDENTITY" \
              "$SIDECAR"
            codesign --verify --strict --verbose=2 "$SIDECAR"
            codesign -dvv "$SIDECAR" 2>&1 | grep -E 'flags=|Authority=' || true
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::error::No sidecar binary found under shell/src-tauri/binaries/maximal-*"
            exit 1
          fi

      # Restore the Rust build cache before the only cargo-compiling step
      # (`tauri build`). On a self-hosted runner GH checks out a clean
      # workspace each run, so the target dir is cold and the long pole.
      # We cache the Cargo registry/git under CARGO_HOME plus the
      # shell/src-tauri/target dir, keyed exact-match on the lockfiles +
      # os/arch (no permissive restore-keys — see the composite for the
      # cache-poisoning rationale).
      - name: Cache Rust build artifacts
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/build-cache
        with:
          cache-name: tauri-macos
          cargo-home: ${{ env.CARGO_HOME }}
          target-path: shell/src-tauri/target
          lockfiles: |
            shell/src-tauri/Cargo.lock
            bun.lock

      - name: Build .app via Tauri
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          cd shell
          bun run tauri build --bundles app
          ls -la src-tauri/target/release/bundle/macos/

      # Sign the bundle WITHOUT --deep. The sidecar inside is already
      # signed (above); signing the bundle top-level seals it without
      # re-signing nested code. (`--verify --deep` is still fine — that
      # only inspects nested signatures, it doesn't replace them.)
      - name: Sign .app with Developer ID
        if: steps.skip.outputs.skip != 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          APP="shell/src-tauri/target/release/bundle/macos/Maximal.app"
          codesign --force --options runtime --timestamp \
            --identifier co.stuffbucket.maximal \
            --entitlements build/macos/maximal.entitlements \
            --sign "$SIGN_IDENTITY" \
            "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Stage DMG layout
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/dmg-stage"
          mkdir -p "$STAGE"
          cp -R shell/src-tauri/target/release/bundle/macos/Maximal.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Build + sign DMG
        if: steps.skip.outputs.skip != 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          mkdir -p dist-release
          OUT="dist-release/${DMG}"
          hdiutil create \
            -volname "Maximal" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "$OUT"
          codesign --force --sign "$SIGN_IDENTITY" "$OUT"
          codesign --verify --verbose=2 "$OUT"

      # Notarizing the .dmg notarizes the .app + sidecar inside it. On a
      # rejection, fetch the notary log (which names the exact offending
      # binary) before failing — the signing changes above only run here on
      # the self-hosted runner, so this is the primary debugging surface.
      - name: Notarize + staple DMG
        if: steps.skip.outputs.skip != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          OUT="dist-release/${DMG}"
          set +e
          SUBOUT="$(xcrun notarytool submit "$OUT" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait --output-format json)"
          RC=$?
          set -e
          echo "$SUBOUT"
          STATUS="$(echo "$SUBOUT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("status",""))' 2>/dev/null || echo '')"
          if [ "$RC" -ne 0 ] || [ "$STATUS" != "Accepted" ]; then
            UUID="$(echo "$SUBOUT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("id",""))' 2>/dev/null || echo '')"
            if [ -n "$UUID" ]; then
              echo "::group::notarytool log $UUID"
              xcrun notarytool log "$UUID" \
                --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
              echo "::endgroup::"
            fi
            echo "::error::DMG notarization failed (status='${STATUS}')."
            exit 1
          fi
          xcrun stapler staple "$OUT"
          xcrun stapler validate "$OUT"
          spctl -a -t open --context context:primary-signature -v "$OUT"
          (cd dist-release && shasum -a 256 "${DMG}" > "${DMG}.sha256")

      - name: Attach signed DMG to release
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ inputs.tag }}
          files: |
            dist-release/${{ env.DMG }}
            dist-release/${{ env.DMG }}.sha256
