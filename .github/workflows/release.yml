name: Release

permissions:
  id-token: write
  contents: write
  # Needed by the `redeploy-site` job so it can fire deploy-pages.yml.
  # GitHub's anti-loop guard suppresses `release: published` triggers
  # when the release is created via GITHUB_TOKEN, so we dispatch the
  # site rebuild explicitly. (The installer jobs are now part of this
  # run via `needs:` + the reusable tauri-macos.yml — no dispatch.)
  actions: write

on:
  push:
    tags:
      - "v*"
  # Manual re-trigger for a tag that already exists — e.g. a tag pushed
  # via the default GITHUB_TOKEN (whose `push: tags` event is suppressed
  # by the anti-loop guard), or to rebuild a release. Select the tag
  # under "Use workflow from" so github.ref_name is the tag, not a branch
  # (the Validate step rejects branches). To recover a partially-failed
  # release, prefer "Re-run failed jobs" on the original run.
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (must already exist; e.g. v0.1.0)
        required: true

# Serialize per-tag so a re-run or a double tag-push can't race two
# release runs against the same draft (the installer jobs would then
# double-build + clobber the same assets). Different tags still run
# concurrently. Never cancel in-flight — a release mid-notarization
# must finish, not be interrupted by a re-trigger.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

# Asset-reuse toggle (read via ${{ vars.RELEASE_REUSE_EXISTING_ASSETS }},
# a repo variable so it works for tag-triggered runs): set it to 'true' to
# let the windows-msi / windows-installer skip gates reuse already-attached
# assets for faster debug re-runs. Unset or any other value rebuilds
# everything from the tag commit (the default).
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    steps:
      # Fail fast on a bad trigger. The whole pipeline keys off
      # github.ref_name, which is only a real version when this runs on
      # a v* tag (push, or "Run workflow" with the tag selected under
      # "Use workflow from"). Running it from a branch (e.g. main) makes
      # ref_name="main", and changelogithub fails ~40s in with the
      # opaque "ref 'main' is not available as tags". Catch it in ~2s
      # with an actionable message instead.
      - name: Validate release ref
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::Release must run on a vX.Y.Z tag, not '$TAG'."
            echo "::error::Cut a release by pushing a tag:  git tag vX.Y.Z && git push origin vX.Y.Z"
            echo "::error::(Running this workflow from a branch with no tag will not work — ref_name is the branch.)"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun run lint:all

      - name: Run type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      # A5: SBOM + license scan. Pure Bun script; no third-party
      # action / npm dep introduced. Fails the job on a disallowed
      # license — the policy is in `scripts/sbom.ts`. Attached to
      # the release later in this job, after `changelogithub` creates
      # the release record.
      - name: Generate SBOM and run license scan
        run: bun scripts/sbom.ts --output SBOM.cdx.json

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-"* ]]; then
            PRERELEASE_PART="${TAG#*-}"
            PRERELEASE_PART="${PRERELEASE_PART%%+*}"
            NPM_TAG="${PRERELEASE_PART%%.*}"

            if [[ ! "$NPM_TAG" =~ ^[A-Za-z][A-Za-z0-9._-]*$ ]]; then
              echo "Unsupported prerelease channel in tag: $TAG"
              exit 1
            fi

            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub Release notes (draft)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          # release.yml owns the GitHub Release end to end: create it as a
          # DRAFT here, attach every asset across the downstream jobs, and
          # let `publish` flip draft→published+latest exactly once at the
          # end. That single publish is required for IMMUTABLE RELEASES —
          # a release can't be re-drafted to add assets once published.
          # release-please only creates the TAG (not a release), so there
          # is never a pre-existing release to adopt here.
          #
          # changelogithub computes notes from the previous v* tag. On the
          # first release no such tag exists and the tool produces a
          # malformed git range, so fall back to gh's auto-generated notes.
          PRIOR="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)"
          if [ -z "$PRIOR" ]; then
            echo "No prior v* tag — creating draft release with --generate-notes"
            FLAGS=(--draft)
            if [[ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]]; then
              FLAGS+=(--prerelease)
            fi
            gh release create "$TAG" --title "$TAG" --generate-notes "${FLAGS[@]}"
          else
            echo "Prior tag $PRIOR — running changelogithub (draft)"
            if [[ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]]; then
              bunx changelogithub --draft --prerelease
            else
              bunx changelogithub --draft
            fi
          fi

      - name: Attach SBOM to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ github.ref_name }}
          files: SBOM.cdx.json

  # Per-arch single-file binaries via `bun build --compile`. Attached
  # to the same GitHub Release as the npm publish above. Stream B's
  # installer workflows consume these by URL + SHA-256.
  #
  # Codesigning / notarization (A4) is DEFERRED for v1. Stubs are
  # left below as `if: false`-gated reminders so the wiring is in
  # place when the cred set lands. v1 ships unsigned binaries —
  # macOS users will see a Gatekeeper "unidentified developer"
  # prompt on first launch (right-click → Open bypasses), Windows
  # users will see SmartScreen. Acceptable for the internal-MS
  # rollout; flip the gate when notarization is unblocked.
  #
  # Contract (do not change without coordinating with Stream B):
  #   <release>/maximal-v<version>-darwin-arm64.tar.gz   # Apple Silicon
  #   <release>/maximal-v<version>-windows-x64.zip
  #   <each>.sha256
  #   SHA256SUMS (aggregated, attached separately)
  #
  # Apple Silicon is the only macOS target. Intel is not supported.
  binaries:
    needs: release
    permissions:
      contents: write
    # Public repo policy: no macOS runners. Bun's `--compile` cross-
    # compiles to all three targets from a Linux host, so we run the
    # whole matrix on ubuntu-latest. Windows binaries also cross-compile
    # cleanly from Linux (the resulting .exe is identical to one built
    # on a Windows runner).
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: bun-darwin-arm64, artifact: darwin-arm64, ext: tar.gz }
          - { target: bun-windows-x64,  artifact: windows-x64,  ext: zip    }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compile binary
        shell: bash
        env:
          MAXIMAL_VERSION: ${{ steps.ver.outputs.version }}
          MAXIMAL_GIT_SHA: ${{ github.sha }}
          MAXIMAL_GIT_BRANCH: ${{ github.ref_name }}
          # Read the matrix value via env rather than inlining the
          # `${{ }}` expression into the shell condition — avoids a
          # shellcheck SC2193 false positive (it can't see the templated
          # value) and keeps workflow expressions out of executed shell.
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          OUT="dist-bin/maximal"
          if [[ "$ARTIFACT" == windows-* ]]; then OUT="${OUT}.exe"; fi

          # --define injects compile-time constants into the binary:
          #   __MAXIMAL_VERSION__   the stripped tag (e.g. "0.3.4")
          #   __MAXIMAL_GIT_SHA__   the full sha (40 hex)
          #   __MAXIMAL_GIT_BRANCH__ the ref name (e.g. "v0.3.4")
          # src/lib/build-info.ts reads these via globalThis with a
          # package.json fallback for non-binary execution.
          bun build --compile --minify --sourcemap \
            --target=${{ matrix.target }} \
            --define "__MAXIMAL_VERSION__=\"${MAXIMAL_VERSION}\"" \
            --define "__MAXIMAL_GIT_SHA__=\"${MAXIMAL_GIT_SHA}\"" \
            --define "__MAXIMAL_GIT_BRANCH__=\"${MAXIMAL_GIT_BRANCH}\"" \
            src/main.ts --outfile "$OUT"

      # macOS signing + notarization — DEFERRED. v1 ships unsigned.
      # Flip the `if: false` to a real condition once A4 unblocks
      # the cred set.
      - name: Codesign (macOS) [DEFERRED A4]
        if: false
        env:
          MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$MACOS_DEVELOPER_ID" dist-bin/maximal

      - name: Notarize (macOS) [DEFERRED A4]
        if: false
        env:
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
          AC_TEAM_ID:  ${{ secrets.AC_TEAM_ID }}
        run: |
          ditto -c -k --keepParent dist-bin/maximal dist-bin/maximal.zip
          xcrun notarytool submit dist-bin/maximal.zip \
            --apple-id "$AC_USERNAME" --password "$AC_PASSWORD" --team-id "$AC_TEAM_ID" \
            --wait
          rm -f dist-bin/maximal.zip

      # Windows Authenticode signing — DEFERRED. v1 ships unsigned.
      - name: Sign (Windows) [DEFERRED A4]
        if: false
        shell: pwsh
        run: |
          # Replace with internal signing-service invocation once A4 is wired.
          # Example using signtool with a cert file (cert handling TBD):
          # signtool sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 /a dist-bin\maximal.exe
          Write-Host "Signing stub — replace with internal signing service"

      - name: Package
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BASE="maximal-v${VERSION}-${{ matrix.artifact }}"
          mkdir -p dist-release
          cd dist-bin
          if [[ "${{ matrix.ext }}" == "zip" ]]; then
            7z a "../dist-release/${BASE}.zip" maximal.exe
          else
            tar -czf "../dist-release/${BASE}.tar.gz" maximal
          fi
          cd ../dist-release
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${BASE}.${{ matrix.ext }}" > "${BASE}.${{ matrix.ext }}.sha256"
          else
            sha256sum "${BASE}.${{ matrix.ext }}" > "${BASE}.${{ matrix.ext }}.sha256"
          fi

      - name: Attach to GitHub Release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ github.ref_name }}
          files: |
            dist-release/maximal-v${{ steps.ver.outputs.version }}-${{ matrix.artifact }}.${{ matrix.ext }}
            dist-release/maximal-v${{ steps.ver.outputs.version }}-${{ matrix.artifact }}.${{ matrix.ext }}.sha256

  # Aggregate SHA256SUMS file (single source of truth for installers
  # that want one round-trip rather than three .sha256 fetches).
  checksums:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch per-arch sha256 files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p sums && cd sums
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern '*.sha256'

      - name: Concatenate into SHA256SUMS
        run: |
          cat sums/*.sha256 | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ github.ref_name }}
          files: SHA256SUMS

  # A6: smoke test on a clean image. Downloads the windows-x64 artifact,
  # unpacks, runs `maximal debug --json`, asserts the schema keys.
  # Catches static-link / missing-dep bugs the build alone misses.
  #
  # Public-repo policy: no macOS runners. We cross-compile darwin
  # binaries from Linux but can't exec Mach-O on ubuntu-latest, so
  # there's no CI smoke for darwin. Manual mitigations:
  #   - First user of each release validates via Homebrew install on
  #     a real Mac; B1's `service do` block fails fast on a broken
  #     binary.
  #   - Pre-tag, run `maximal debug --json` once on a developer
  #     Mac.
  # Same source tree + same Bun toolchain produces all three targets,
  # so a successful Windows smoke is decent transitive evidence.
  smoke:
    needs: binaries
    permissions:
      # write, not read: this job `gh release download`s from the release
      # while it's still a DRAFT, and draft releases are invisible to a
      # read-only token (the download fails with "release not found").
      contents: write
    runs-on: windows-2022
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "maximal-v${{ steps.ver.outputs.version }}-windows-x64.zip"

      - name: Unpack
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Filter '*.zip' | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath . -Force

      - name: Smoke check
        shell: pwsh
        run: |
          .\maximal.exe debug --json | Out-File -FilePath debug.json -Encoding utf8
          Get-Content debug.json
          $j = Get-Content debug.json | ConvertFrom-Json
          foreach ($k in @('version','git','runtime','config','secrets','executor')) {
            if ($null -eq $j.$k) {
              Write-Error "Missing top-level key: $k"
              exit 1
            }
          }

  # Standard Homebrew release mechanic for a private tap: render
  # the formula with the just-published version + per-arch SHAs and
  # push it to `stuffbucket/homebrew-tap/Formula/maximal.rb`. Users
  # then `brew tap stuffbucket/tap` once and `brew upgrade maximal`
  # picks up subsequent releases automatically.
  #
  # Requires the `HOMEBREW_TAP_TOKEN` repo secret: a PAT or fine-
  # grained token with Contents:write on `stuffbucket/homebrew-tap`.
  # The job no-ops with a warning if the secret is absent so a
  # missing token doesn't fail the whole release.
  homebrew-tap:
    # After `publish`: sync-homebrew-formula.ts fetches each per-arch
    # .sha256 over public HTTPS, which only resolves once the release
    # is published (draft assets are not publicly downloadable).
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump formula in stuffbucket/homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping tap bump."
            echo "::warning::Create a fine-grained PAT with Contents:write on stuffbucket/homebrew-tap and add it as a repo secret to enable."
            exit 0
          fi

          # Render the formula against the GitHub release we just
          # cut. The script fetches each per-arch .sha256 over HTTPS.
          mkdir -p out
          bun scripts/sync-homebrew-formula.ts \
            --org stuffbucket \
            --repo maximal \
            --version "$VERSION" \
            --output out/maximal.rb

          # Clone the tap, copy the rendered file in, push.
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/stuffbucket/homebrew-tap.git" \
            tap
          mkdir -p tap/Formula
          cp out/maximal.rb tap/Formula/maximal.rb

          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Formula/maximal.rb
          # Use --cached so this also catches the brand-new-file case
          # (untracked → staged → diff vs HEAD). git diff (no --cached)
          # was a no-op on a new file and silently skipped the commit.
          if git diff --cached --quiet -- Formula/maximal.rb; then
            echo "No formula changes for $TAG — already in sync."
            exit 0
          fi
          git commit -m "maximal: bump to $TAG"
          git push origin HEAD:main

  # ── Installers ───────────────────────────────────────────────────────
  # These were a separate installers.yml dispatched + polled for up to an
  # hour; now they're jobs in this run. `publish` gates on them through
  # `needs:`, so a slow Apple notarization just delays publish instead of
  # racing a fixed wall-clock timer that left healthy builds stuck as
  # drafts. All build from the tag commit (this run's checkout), so the
  # installers match the binaries. Each keeps an idempotency skip gate so
  # re-running a partially-failed release rebuilds only what's missing.

  # macOS signed .dmg — built by the private stuffbucket/macos-builder
  # (self-hosted runner + Apple signing material), so it runs OFF this runner:
  # we dispatch it and poll. Critically the builder uploads the signed .dmg to
  # THIS release while it is still a DRAFT (mutable), and `publish` GATES on
  # this job — so the .dmg is part of the single draft→published flip and lands
  # INSIDE the immutable release. Attaching it after publish (the old async
  # model) is rejected with HTTP 422 on an immutable release. If the build
  # fails/times out, the release stays a draft rather than publishing without a
  # macOS download. See .macos-builder/{config,build.sh}.
  macos-dmg:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Build (or reuse) the signed .dmg and ensure it is on the draft
        env:
          BUILDER_PAT: ${{ secrets.MACOS_BUILDER_PAT }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          DMG="maximal-${TAG}-darwin-arm64.dmg"
          present() {
            gh release view "$TAG" --repo "$REPO" --json assets \
              --jq '.assets[].name' 2>/dev/null | grep -Fxq "$DMG"
          }
          # Idempotent: a re-run after the .dmg already landed is a no-op (no
          # second 15-minute private build).
          if present; then
            echo "$DMG already attached to the draft — skipping rebuild."
            exit 0
          fi
          echo "Dispatching the private macOS builder for ${REPO} at ${TAG}…"
          GH_TOKEN="$BUILDER_PAT" gh workflow run build.yml \
            --repo stuffbucket/macos-builder --ref main \
            -f "repo=${REPO}" -f "ref=${TAG}"
          echo "Polling the draft for ${DMG} (sign + notarize takes a few min)…"
          for i in $(seq 1 40); do   # ~30 min cap (45s × 40)
            sleep 45
            if present; then
              echo "${DMG} present after ~$((i * 45))s."
              exit 0
            fi
          done
          echo "::error::Timed out waiting for ${DMG} on the draft release. See the stuffbucket/macos-builder run; the release stays a draft (not published without a macOS build)." >&2
          exit 1

  # Windows PowerShell installer — install.ps1 shipped verbatim + sha256.
  windows-installer:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      # Asset-reuse gate (OPT-IN): only skip when the repo variable
      # RELEASE_REUSE_EXISTING_ASSETS is exactly 'true' AND install.ps1 is
      # already attached. Default (variable unset) => never skips => always
      # re-stages from the tag commit.
      - name: Skip if installer already attached
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
          REUSE: ${{ vars.RELEASE_REUSE_EXISTING_ASSETS }}
        run: |
          set -euo pipefail
          if [ "${REUSE:-}" != "true" ]; then
            echo "RELEASE_REUSE_EXISTING_ASSETS not 'true' — staging from tag commit."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
          if grep -Fxq "install.ps1" <<<"$ASSETS"; then
            echo "Reuse enabled and install.ps1 already attached to $TAG — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Reuse enabled but install.ps1 not yet present on $TAG — staging."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage installer + sha256
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p dist-release
          cp build/windows/install.ps1 dist-release/install.ps1
          (cd dist-release && shasum -a 256 install.ps1 > install.ps1.sha256)
          ls -la dist-release

      - name: Attach installer to release
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/install.ps1
            dist-release/install.ps1.sha256

  # Windows MSI (WiX, per-user). Wraps the windows-x64 binary the
  # `binaries` job attached to this release.
  windows-msi:
    needs: binaries
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      # Asset-reuse gate (OPT-IN): only skip when the repo variable
      # RELEASE_REUSE_EXISTING_ASSETS is exactly 'true' AND the MSI is
      # already attached. Default (variable unset) => never skips => always
      # rebuilds the MSI from the tag commit.
      - name: Skip if MSI already attached
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
          REUSE: ${{ vars.RELEASE_REUSE_EXISTING_ASSETS }}
        shell: bash
        run: |
          set -euo pipefail
          MSI="maximal-${TAG}-windows-x64.msi"
          if [ "${REUSE:-}" != "true" ]; then
            echo "RELEASE_REUSE_EXISTING_ASSETS not 'true' — building from tag commit."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
          if grep -Fxq "$MSI" <<<"$ASSETS"; then
            echo "Reuse enabled and $MSI already attached to $TAG — skipping build + upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Reuse enabled but $MSI not yet present on $TAG — building."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: ver
        if: steps.skip.outputs.skip != 'true'
        shell: bash
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download windows-x64 zip + sha256
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          ZIP="maximal-${TAG}-windows-x64.zip"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ZIP" \
            --pattern "$ZIP.sha256" \
            --dir dist-bin
          echo "Verifying SHA-256"
          ( cd dist-bin && sha256sum -c "$ZIP.sha256" )

      - name: Unpack zip
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem -Path dist-bin -Filter '*.zip' | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath staging -Force
          if (-not (Test-Path 'staging\maximal.exe')) {
            Write-Error "maximal.exe missing from $($zip.Name)"
            exit 1
          }
          Get-ChildItem staging

      - name: Install WiX
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          $userBin = Join-Path $env:USERPROFILE '.dotnet\tools'
          echo $userBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$userBin\wix.exe" --version

      - name: Build MSI
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ steps.ver.outputs.version }}'
          $out = "dist-release\maximal-${env:TAG}-windows-x64.msi"
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          # WiX resolves the .wxs's source files (maximal.exe) via -bindpath.
          wix build build\windows\maximal.wxs `
            -d "Version=$version" `
            -arch x64 `
            -bindpath staging `
            -out $out

      - name: SHA-256
        if: steps.skip.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd dist-release
          sha256sum "maximal-${TAG}-windows-x64.msi" > "maximal-${TAG}-windows-x64.msi.sha256"
          cat "maximal-${TAG}-windows-x64.msi.sha256"

      - name: Attach MSI to release
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/maximal-${{ env.TAG }}-windows-x64.msi
            dist-release/maximal-${{ env.TAG }}-windows-x64.msi.sha256

  # Verify the MSI works end-to-end on a clean Windows image: silent
  # install → assert registry/files/PATH → run the installed binary →
  # uninstall → assert clean removal. Gates `publish` directly via the
  # job graph (no sentinel asset needed now). Assertions track
  # build/windows/maximal.wxs (per-user install to
  # %LocalAppData%\Programs\maximal, ARP DisplayName "maximal", HKCU
  # marker Software\stuffbucket\maximal\installed=1, install dir on PATH).
  windows-msi-verify:
    needs: windows-msi
    runs-on: windows-2022
    permissions:
      # write, not read: downloads the MSI from the DRAFT release, which a
      # read-only token can't see ("release not found").
      contents: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Resolve asset name
        id: names
        shell: bash
        run: echo "msi=maximal-${TAG}-windows-x64.msi" >> "$GITHUB_OUTPUT"

      - name: Download MSI from release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${{ steps.names.outputs.msi }}" \
            --dir .
          ls -lh "${{ steps.names.outputs.msi }}"

      - name: Install MSI silently
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msi = (Resolve-Path "${{ steps.names.outputs.msi }}").Path
          $log = Join-Path $env:GITHUB_WORKSPACE 'install.log'
          # msiexec is a GUI-subsystem binary: invoked bare it detaches and
          # PowerShell returns 0 regardless. -Wait -PassThru blocks and
          # gives the real exit code. 0 = success; 3010/1641 = restart-related.
          $p = Start-Process msiexec.exe `
            -ArgumentList "/i `"$msi`" /qn /norestart /l*v `"$log`"" `
            -Wait -PassThru
          Write-Host "msiexec /i exit code: $($p.ExitCode)"
          if ($p.ExitCode -notin @(0, 1641, 3010)) {
            throw "MSI install failed (exit $($p.ExitCode))"
          }

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msi-install-log-${{ env.TAG }}
          path: install.log
          if-no-files-found: ignore

      - name: Verify post-install state
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Join-Path $env:LOCALAPPDATA 'Programs\maximal\maximal.exe'
          if (-not (Test-Path $exe)) { throw "maximal.exe missing at $exe" }
          Write-Host "maximal.exe present ($((Get-Item $exe).Length) bytes)"

          # Don't assert on the Add/Remove-Programs (Uninstall) registry key:
          # for a per-user MSI on a fresh CI profile the HKCU\...\Uninstall
          # hive may not exist at all, and the exact location varies. A
          # successful `msiexec /x <file>` in the Uninstall step proves the
          # product is registered with Windows Installer. Assert only the
          # signals build/windows/maximal.wxs makes deterministic: our own
          # HKCU marker (hard) and the PATH entry (soft — log, don't fail).
          $marker = Get-ItemPropertyValue 'HKCU:\Software\stuffbucket\maximal' 'installed' -ErrorAction SilentlyContinue
          if ($marker -ne 1) { throw "HKCU marker Software\stuffbucket\maximal\installed != 1 (got '$marker')" }

          $userPath = [Environment]::GetEnvironmentVariable('PATH', 'User')
          if ($userPath -notlike '*Programs\maximal*') {
            Write-Warning "install dir not found in user PATH (non-fatal): $userPath"
          } else {
            Write-Host "install dir present in user PATH"
          }
          Write-Host "post-install state OK"

      - name: Smoke-test installed binary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Run from the INSTALLED location — proves the MSI placed a
          # working binary. `debug --json` needs no credentials.
          $exe = Join-Path $env:LOCALAPPDATA 'Programs\maximal\maximal.exe'
          & $exe debug --json | Out-File -FilePath debug.json -Encoding utf8
          $j = Get-Content debug.json | ConvertFrom-Json
          foreach ($k in @('version','git','runtime','config','secrets','executor')) {
            if ($null -eq $j.$k) { throw "Missing top-level key in debug --json: $k" }
          }
          Write-Host "installed binary debug --json OK (version=$($j.version))"

      - name: Uninstall MSI silently
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Uninstall by the package file — msiexec resolves the ProductCode
          # from it (no brittle registry lookup), and a clean exit also
          # confirms the product was actually registered by the install.
          $msi = (Resolve-Path "${{ steps.names.outputs.msi }}").Path
          $log = Join-Path $env:GITHUB_WORKSPACE 'uninstall.log'
          $p = Start-Process msiexec.exe `
            -ArgumentList "/x `"$msi`" /qn /norestart /l*v `"$log`"" `
            -Wait -PassThru
          Write-Host "msiexec /x exit code: $($p.ExitCode)"
          if ($p.ExitCode -notin @(0, 1641, 3010)) {
            throw "MSI uninstall failed (exit $($p.ExitCode))"
          }

      - name: Upload uninstall log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msi-uninstall-log-${{ env.TAG }}
          path: uninstall.log
          if-no-files-found: ignore

      - name: Verify clean removal
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Join-Path $env:LOCALAPPDATA 'Programs\maximal\maximal.exe'
          if (Test-Path $exe) { throw "maximal.exe still present after uninstall: $exe" }
          # Check the marker VALUE is gone (the parent key may linger empty,
          # so don't assert on the key path).
          $m = Get-ItemPropertyValue 'HKCU:\Software\stuffbucket\maximal' 'installed' -ErrorAction SilentlyContinue
          if ($null -ne $m) { throw "HKCU marker 'installed' still present after uninstall (got '$m')" }
          $userPath = [Environment]::GetEnvironmentVariable('PATH', 'User')
          if ($userPath -like '*Programs\maximal*') {
            Write-Warning "install dir still in user PATH after uninstall (non-fatal)"
          }
          Write-Host "clean removal verified"

  # Flip the draft release to published + latest, but ONLY after every
  # asset is attached: binaries, checksums, the smoke-tested Windows
  # build, and every installer (macOS .dmg, Windows install.ps1
  # and MSI, with the MSI verified end-to-end). If any upstream job fails
  # the release stays a draft, so users never see an incomplete "Latest".
  # Recover by re-running the failed jobs (GitHub "Re-run failed jobs"),
  # then re-running publish — or publish the draft by hand.
  publish:
    needs:
      - release
      - checksums
      - smoke
      - windows-installer
      - windows-msi
      - windows-msi-verify
      - macos-dmg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Idempotent: if a prior run already flipped this release to
          # published, a re-run of `publish` (e.g. retrying a later job)
          # must be a no-op rather than re-running the draft→published
          # transition on a live release.
          DRAFT="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null || echo 'true')"
          if [ "$DRAFT" = "false" ]; then
            echo "Release $TAG is already published — nothing to do."
            exit 0
          fi
          if [[ "${{ needs.release.outputs.is_prerelease }}" == "true" ]]; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease
          else
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          fi
          echo "Published $TAG"

  # GitHub suppresses the `release: published` event when a release is
  # created via GITHUB_TOKEN (the anti-loop guard documented up top),
  # which means deploy-pages.yml's `release` trigger never fires for
  # our releases. Explicitly dispatch the site rebuild here so the
  # landing page's "latest: vX.Y.Z" + download URLs always track the
  # release that was just published.
  redeploy-site:
    # After `publish`: the landing page advertises "latest: vX.Y.Z" and
    # links the release download URLs, so it must rebuild against a
    # published, fully-assembled release — not the draft.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger deploy-pages.yml
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh workflow run deploy-pages.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main
          echo "Dispatched deploy-pages.yml after $TAG"
