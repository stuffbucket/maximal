name: Docker Build and Push

# DISABLED for internal MS distribution.
#
# This workflow depends on six third-party actions (docker/login-action,
# docker/setup-qemu-action, docker/setup-buildx-action, docker/metadata-
# action, docker/build-push-action, sigstore/cosign-installer) which the
# internal MS GitHub Actions environment rejects. v1 internal
# distribution ships per-arch binaries + DMG + MSI, not Docker images
# (see docs/spec/internal-distribution.md).
#
# Re-enable only if (a) the internal action allowlist gains the
# docker/* + sigstore set, OR (b) we vendor those actions as composite
# replacements (substantially more effort than for setup-bun /
# action-gh-release; the docker/* actions wrap docker buildx invocations
# that are themselves non-trivial to reproduce in shell).
#
# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  workflow_dispatch:    # manual-only; tag trigger removed for internal use
  # push:
  #   tags: [ 'v*.*.*' ]
  #   paths-ignore:
  #     - 'docs/**'

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  #IMAGE_NAME: ${{ github.repository }}


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          mkdir -p handlers
          echo ${GITHUB_REF#refs/tags/v} > handlers/VERSION

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@main
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: 'arm64,amd64'

      # Workaround: https://github.com/docker/build-push-action/issues/461
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}

