name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    types: [opened, synchronize, reopened]
  # GitHub merge queue: dispatched against synthetic
  # gh-readonly-queue/<base>/... refs. Required status checks must run
  # here too or the queue blocks indefinitely waiting for them.
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    # Backstop against a hung/runaway step (e.g. a poll loop that spins on a
    # blocked network): fail fast in minutes instead of burning the full runner
    # allowance. The whole suite runs well under this locally and in CI.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify Node sqlite support
        run: node -e "import('node:sqlite').then(() => console.log('node:sqlite ok')).catch((error) => { console.error(error); process.exit(1) })"

      - uses: ./.github/actions/setup-bun
        with:
          # Pinned to match the version the suite is currently green
          # against locally. `latest` regressed module-export resolution
          # on 2026-05-21 (run 26232611959 / 26232603655); 22 tests
          # failed with "Export named 'X' not found in module token.ts"
          # despite the exports being present. Bump intentionally when
          # we want a newer Bun, not by drift.
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun run lint:all

      - name: Run type check
        run: bun run typecheck

      - name: Type check (shell UI)
        # The shell/src tree (settings React app + islands, i18n runtime, proxy
        # client, Tauri bridge) is excluded from the root tsconfig, so a type
        # error there could ship. Typecheck it against shell/tsconfig.json.
        # Hermetic: install shell's own deps (@types/react etc.) in-step rather
        # than relying on the root `prepare` side effect.
        run: |
          cd shell && bun install --frozen-lockfile
          bun run typecheck

      - name: Check design tokens
        # Two gates: (1) the design-token drift rules (check:tokens), and
        # (2) freshness — shell/src/ui/styles/tokens.css must be a clean
        # regeneration of theme.ts (tokens:verify). Previously local-only via
        # check:fast, so drift or a stale generated file could merge freely.
        run: bun run check:design

      - name: Guard boundary casts
        # Fail on a NEW unvalidated any→concrete boundary cast (the class behind
        # the device-code interval:NaN poll spin). The known-safe set is annotated
        # in-place with `// casts-keep: <reason>`; see scripts/find-casts.ts.
        run: bun run casts:check

      - name: Run tests
        # MAXIMAL_TEST_BUILD enables the production-build smoke test
        # (tests/settings-build.test.ts), which spawns `bun run build:ui` and
        # asserts the servable assets exist. Gated off for local `bun test`
        # loops (it writes to shell/dist); enabled here so a broken UI build
        # reds CI. shell deps are already installed by the shell typecheck step.
        env:
          MAXIMAL_TEST_BUILD: "1"
        run: bun test

      - name: Build
        run: bun run build
