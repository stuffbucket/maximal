name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  # See ci.yml — required checks must also run on merge_group.
  merge_group:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # trufflehog needs full history to diff PR commits against
          # base. Shallow checkout would force a full-tree scan and
          # produce noisy results.
          fetch-depth: 0

      - name: Scan with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          # On PRs, scan only the diff (base..head). On push-to-main,
          # the action defaults to scanning the new commits introduced
          # by the push.
          extra_args: --results=verified,unknown
