name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  # Rebuild the site whenever a new release is published so the
  # download links pick up the new version automatically.
  release:
    types: [ published ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages.
# `actions: write` lets the "Remove stale github-pages artifact" step below
# delete a prior attempt's artifact via the Actions API before re-uploading.
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

# One deployment at a time. `cancel-in-progress: true` so a newer commit or
# dispatch supersedes and CANCELS an in-flight deploy rather than queuing
# behind it: the site is a derived artifact with no per-run state worth
# draining, so the freshest content wins and superseded attempts don't linger
# (see docs/decisions/site-runtime-version-manifest.md).
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build the Astro site under ./site and deploy site/dist to Pages.
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      # Guard against the publish→deploy propagation race. The `release:
      # published` event fires the deploy seconds before GitHub's
      # `releases/latest` endpoint recomputes which release is "latest", so the
      # build below would resolve the PREVIOUS tag and ship stale version +
      # download links (observed on v0.4.36: the auto-deploy ran 6s after
      # publish and shipped v0.4.35). The cache-busting in site/src/lib/version.ts
      # defeats CDN staleness but not this server-side lag — a fresh body still
      # names the old release until propagation completes.
      #
      # So when a release publish triggers this run, poll until the API reflects
      # the just-published tag before building. Only for non-prereleases: the
      # landing page tracks the latest *stable* release (resolveLatestRelease →
      # releases/latest), which never reports a prerelease, so gating a beta
      # publish on it would spin until timeout. A push / manual dispatch has no
      # specific tag to wait for and skips this entirely.
      - name: Wait for releases/latest to reflect this release
        if: github.event_name == 'release' && github.event.release.prerelease == false
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          echo "Waiting for releases/latest to report ${EXPECTED_TAG}..."
          for attempt in $(seq 1 30); do
            # Cache-bust the CDN (its key includes the query string) and force
            # revalidation, mirroring site/src/lib/version.ts.
            latest=$(gh api \
              -H "Cache-Control: no-cache" \
              "repos/${GITHUB_REPOSITORY}/releases/latest?_cb=${attempt}-${RANDOM}" \
              --jq '.tag_name' 2>/dev/null || echo "")
            if [ "$latest" = "$EXPECTED_TAG" ]; then
              echo "releases/latest is ${latest} (attempt ${attempt}); proceeding."
              exit 0
            fi
            echo "attempt ${attempt}: releases/latest=${latest:-<none>}, want ${EXPECTED_TAG}; retrying in 10s"
            sleep 10
          done
          echo "::error::releases/latest never reported ${EXPECTED_TAG} after ~5 min. Refusing to deploy a stale site; re-run this job once the API catches up." >&2
          exit 1

      - name: Build Astro
        working-directory: site
        env:
          # Optional temporary pin: set the SITE_PIN_VERSION repo variable
          # (e.g. v0.4.8) to freeze the landing page on that release's
          # version + download links instead of tracking /releases/latest.
          # Unset it (gh variable delete SITE_PIN_VERSION) + redeploy to
          # resume tracking latest. Empty when the variable is absent.
          VITE_SITE_PIN_VERSION: ${{ vars.SITE_PIN_VERSION }}
          # Authenticate the releases/latest lookup in index.astro so a busy
          # release day can't exhaust the anonymous 60-req/hr rate limit and
          # silently deploy a site with no version label / download links.
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Guard against the "Multiple artifacts named github-pages" deploy trap.
      # `actions/deploy-pages` refuses to deploy when a run has >1 artifact
      # named `github-pages`, and `upload-pages-artifact` does NOT overwrite —
      # so re-running the failed deploy job re-uploads a SECOND copy without
      # removing the first, driving the count 1→2→3 and failing every re-run
      # harder (see issue #239). Deleting any pre-existing copy for THIS run
      # before uploading keeps the count at exactly 1, making re-runs safe.
      # No-ops on a first attempt (nothing to delete).
      - name: Remove stale github-pages artifact from this run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ids=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?name=github-pages" \
            --jq '.artifacts[].id')
          if [ -z "$ids" ]; then
            echo "No pre-existing github-pages artifact for this run; nothing to remove."
            exit 0
          fi
          for id in $ids; do
            echo "Deleting stale github-pages artifact ${id} from run ${GITHUB_RUN_ID}"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5