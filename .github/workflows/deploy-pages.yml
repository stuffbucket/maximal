name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  # Rebuild the site whenever a new release is published so the
  # download links pick up the new version automatically.
  release:
    types: [ published ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build the Astro site under ./site and deploy site/dist to Pages.
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build Astro
        working-directory: site
        env:
          # Optional temporary pin: set the SITE_PIN_VERSION repo variable
          # (e.g. v0.4.8) to freeze the landing page on that release's
          # version + download links instead of tracking /releases/latest.
          # Unset it (gh variable delete SITE_PIN_VERSION) + redeploy to
          # resume tracking latest. Empty when the variable is absent.
          VITE_SITE_PIN_VERSION: ${{ vars.SITE_PIN_VERSION }}
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5