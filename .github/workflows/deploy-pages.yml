name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
    # Only redeploy when something the deployed site actually depends on
    # changes. A src-only or test-only commit no longer rebuilds+redeploys
    # Pages — the previously unfiltered trigger multiplied deploy volume (and
    # so the odds of the GitHub Pages backend flakiness / the re-run artifact
    # trap in #239) on busy main days (issue #222 / #218; see
    # docs/decisions/site-runtime-version-manifest.md).
    #
    # `site/public/updates/manifest.json` is listed on purpose: release.yml's
    # `manifest` job commits that file to main on publish, and this filter is
    # what turns that commit into exactly one Pages deploy — so a release
    # advertises its new version to the site with NO explicit dispatch (the
    # `redeploy-site` job that used to do that is now gone). It lives under
    # site/public/ so `site/**` already covers it; it is named here only to
    # document that the release→site path rides this trigger.
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages.
# `actions: write` lets the "Remove stale github-pages artifact" step below
# delete a prior attempt's artifact via the Actions API before re-uploading.
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

# One deployment at a time. `cancel-in-progress: true` so a newer commit or
# dispatch supersedes and CANCELS an in-flight deploy rather than queuing
# behind it: the site is a derived artifact with no per-run state worth
# draining, so the freshest content wins and superseded attempts don't linger
# (see docs/decisions/site-runtime-version-manifest.md).
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build the Astro site under ./site and deploy site/dist to Pages.
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: ./.github/actions/setup-bun
        with:
          bun-version: latest

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build Astro
        working-directory: site
        env:
          # Optional temporary pin: set the SITE_PIN_VERSION repo variable
          # (e.g. v0.4.8) to freeze the landing page on that release's
          # version + download links instead of tracking /releases/latest.
          # Unset it (gh variable delete SITE_PIN_VERSION) + redeploy to
          # resume tracking latest. Empty when the variable is absent.
          VITE_SITE_PIN_VERSION: ${{ vars.SITE_PIN_VERSION }}
          # Authenticate the releases/latest lookup in index.astro so a busy
          # release day can't exhaust the anonymous 60-req/hr rate limit and
          # silently deploy a site with no version label / download links.
          #
          # RETAINED ON PURPOSE (issue #222 / #218): #221 added runtime
          # manifest hydration, but it is progressive enhancement over this
          # build-time resolution, which is still the server-rendered
          # fail-closed fallback for no-JS / crawlers / a failed manifest
          # fetch. So the site never fails to advertise a version even without
          # the removed `redeploy-site` dispatch. Retiring this build-time
          # GitHub-API lookup (and SITE_PIN) is Phase 4 / issue #223, not here.
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Guard against the "Multiple artifacts named github-pages" deploy trap.
      # `actions/deploy-pages` refuses to deploy when a run has >1 artifact
      # named `github-pages`, and `upload-pages-artifact` does NOT overwrite —
      # so re-running the failed deploy job re-uploads a SECOND copy without
      # removing the first, driving the count 1→2→3 and failing every re-run
      # harder (see issue #239). Deleting any pre-existing copy for THIS run
      # before uploading keeps the count at exactly 1, making re-runs safe.
      # No-ops on a first attempt (nothing to delete).
      - name: Remove stale github-pages artifact from this run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ids=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?name=github-pages" \
            --jq '.artifacts[].id')
          if [ -z "$ids" ]; then
            echo "No pre-existing github-pages artifact for this run; nothing to remove."
            exit 0
          fi
          for id in $ids; do
            echo "Deleting stale github-pages artifact ${id} from run ${GITHUB_RUN_ID}"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5