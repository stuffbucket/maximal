# Pin or unpin the landing page's advertised version, then redeploy.
#
# "pin"   → freezes the site on a specific release's version + download
#           links by setting the SITE_PIN_VERSION repo variable.
# "unpin" → deletes the variable so the site resumes tracking GitHub's
#           /releases/latest.
#
# The variable is read at build time as VITE_SITE_PIN_VERSION — see
# deploy-pages.yml ("Build Astro") and site/src/pages/index.astro. This
# workflow applies the change and dispatches deploy-pages.yml so it goes
# live without any local gh commands.
#
# Managing an Actions *variable* requires a token with Variables:write;
# the default GITHUB_TOKEN cannot. Provide a fine-grained PAT (this repo,
# Repository permissions -> Variables: Read and write) as the
# SITE_PIN_TOKEN secret. The job fails fast with instructions if it's
# missing. (Dispatching the redeploy uses the default token.)

name: Site version pin

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Pin the site to a version, or unpin to resume tracking latest
        type: choice
        options:
          - pin
          - unpin
        default: pin
        required: true
      version:
        description: "Tag to pin to, e.g. v0.4.7 (required for pin; ignored for unpin)"
        type: string
        required: false

permissions:
  contents: read
  actions: write # dispatch deploy-pages.yml

concurrency:
  # Serialize against itself and the deploy it triggers downstream.
  group: site-pin
  cancel-in-progress: false

jobs:
  site-pin:
    runs-on: ubuntu-latest
    steps:
      - name: Require SITE_PIN_TOKEN
        env:
          SITE_PIN_TOKEN: ${{ secrets.SITE_PIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_PIN_TOKEN:-}" ]; then
            echo "::error::SITE_PIN_TOKEN is not set. Managing an Actions variable needs a"
            echo "::error::token with Variables:write — the default GITHUB_TOKEN cannot."
            echo "::error::Create a fine-grained PAT on this repo (Repository permissions ->"
            echo "::error::Variables: Read and write) and add it as the SITE_PIN_TOKEN secret."
            exit 1
          fi

      - name: Pin
        if: ${{ inputs.mode == 'pin' }}
        env:
          GH_TOKEN: ${{ secrets.SITE_PIN_TOKEN }}
          RELEASE_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::pin requires a version tag like vX.Y.Z (got '${VERSION:-<empty>}')."
            exit 1
          fi
          # Don't pin to a version with no published release — its download
          # links would 404. Read releases with the default token (the PAT
          # only needs Variables:write).
          if ! GH_TOKEN="$RELEASE_TOKEN" gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::No release '$VERSION' found — refusing to pin the site to a missing release."
            exit 1
          fi
          gh variable set SITE_PIN_VERSION --repo "$GITHUB_REPOSITORY" --body "$VERSION"
          echo "Pinned the site to $VERSION."

      - name: Unpin
        if: ${{ inputs.mode == 'unpin' }}
        env:
          GH_TOKEN: ${{ secrets.SITE_PIN_TOKEN }}
        run: |
          set -euo pipefail
          if gh variable delete SITE_PIN_VERSION --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            echo "Unpinned — the site will resume tracking /releases/latest on redeploy."
          else
            echo "SITE_PIN_VERSION was not set — nothing to unpin."
          fi

      - name: Redeploy site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run deploy-pages.yml --repo "$GITHUB_REPOSITORY" --ref main
          echo "Dispatched deploy-pages.yml to apply the change."
