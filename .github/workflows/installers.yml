# Installer assembly. Runs after release.yml has attached the per-arch
# headless binaries to the (draft) release; builds the platform installers
# and attaches them to the same release. Gated end-to-end so release.yml's
# `publish` job only flips the release to "Latest" once these all land.
#
# Jobs and what they produce (all keyed off the release tag):
#   - tauri-macos        self-hosted macOS arm64. Natively builds the Tauri
#                        menu-bar .app, signs it with Developer ID, notarizes
#                        + staples, then produces BOTH a zipped .app and a
#                        signed/notarized .dmg (hdiutil). Attaches
#                        maximal-<tag>-darwin-arm64.{app.zip,dmg}(+.sha256).
#   - windows-installer  ubuntu. Ships build/windows/install.ps1 verbatim
#                        (+ .sha256).
#   - windows-msi        windows-2022. WiX per-user MSI
#                        (maximal-<tag>-windows-x64.msi + .sha256).
#   - windows-msi-verify windows-2022. Installs the MSI silently, asserts the
#                        install (registry/files/PATH), runs the installed
#                        binary, uninstalls, asserts clean removal — then
#                        uploads a `<msi>.verified` sentinel that release.yml
#                        gates publish on. Without it, an MSI that wraps a
#                        working .exe but installs/uninstalls incorrectly
#                        could still ship.
#
# Actions policy: first-party `actions/*` only, plus the vendored
# composites under `./.github/actions/`:
#   - setup-bun           (replaces oven-sh/setup-bun)
#   - upload-release-asset (replaces softprops/action-gh-release;
#                           wraps `gh release upload --clobber`)
# No third-party `uses:` references.
#
# Spec: docs/spec/archive/internal-distribution-stream-b.md §7 (B2 macOS .app).

name: Installers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to repackage (e.g. v0.1.0)
        required: true

permissions:
  contents: write
  # Needed by `ensure-release` so it can `gh workflow run release.yml`.
  # Without `actions: write`, the workflow-dispatch API returns 403.
  actions: write

# Serialize per-tag. release.yml dispatches this workflow, and it can
# also be triggered manually for the same tag — without this, two runs
# fan out onto the SINGLE self-hosted macOS runner and double-build +
# double-notarize the same bundle, racing `gh release upload --clobber`
# on identical asset names. Same group as nothing else; different tags
# still run concurrently. Don't cancel in-flight notarization.
concurrency:
  group: installers-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  # On `release: published`, the release exists by definition and
  # this job exits in milliseconds. On `workflow_dispatch` against a
  # tag that doesn't yet have a release (or doesn't yet have a tag at
  # all), this job creates the tag from the current ref, pushes it
  # to fire `release.yml`, and waits for the release to be
  # published. Subsequent jobs gate on this one via `needs:`.
  ensure-release:
    name: Ensure release exists
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Ensure tag + release for $TAG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          # No release exists yet → the tag (if any) is orphaned and
          # may point at a stale commit whose workflow files don't
          # match what `gh workflow run` needs. Force-recreate the tag
          # at the current ref so release.yml at the tag is the same
          # version that includes `workflow_dispatch`. Once a release
          # exists, this branch is skipped entirely (early-exit above)
          # and the tag is treated as immutable.
          git fetch --tags origin
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            EXISTING="$(git rev-parse "refs/tags/$TAG")"
            HEAD_SHA="$(git rev-parse HEAD)"
            if [ "$EXISTING" = "$HEAD_SHA" ]; then
              echo "Tag $TAG already at HEAD ($HEAD_SHA); skipping retag"
            else
              echo "Tag $TAG points at $EXISTING but no release exists — retagging at HEAD ($HEAD_SHA)"
              git tag -d "$TAG"
              git push --delete origin "$TAG"
              git tag -a "$TAG" -m "Release $TAG (auto-tagged by installers.yml)"
              git push origin "$TAG"
            fi
          else
            echo "Tag $TAG does not exist — creating from $(git rev-parse --short HEAD)"
            git tag -a "$TAG" -m "Release $TAG (auto-tagged by installers.yml)"
            git push origin "$TAG"
          fi

          # GitHub's anti-loop guard suppresses `push: tags` triggers
          # when the push uses the default GITHUB_TOKEN, so we have to
          # fire release.yml explicitly. The tag ref must already
          # exist on the remote at this point.
          echo "Dispatching release.yml on refs/tags/$TAG ..."
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "refs/tags/$TAG" \
            --field "tag=$TAG"

          # Wait for the release record AND the per-arch binaries.
          # release.yml's `release` job creates the shell record, then
          # the dependent `binaries` job uploads the tarballs/zips
          # several minutes later. The matrix jobs below need the
          # binaries, not just the shell.
          echo "Waiting up to 30 minutes for $TAG release + binaries ..."
          REQUIRED=(
            "maximal-${TAG}-darwin-arm64.tar.gz"
            "maximal-${TAG}-darwin-arm64.tar.gz.sha256"
            "maximal-${TAG}-windows-x64.zip"
            "maximal-${TAG}-windows-x64.zip.sha256"
          )
          for i in $(seq 1 60); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
              MISSING=0
              for f in "${REQUIRED[@]}"; do
                if ! grep -Fxq "$f" <<<"$ASSETS"; then
                  MISSING=1
                  break
                fi
              done
              if [ "$MISSING" = 0 ]; then
                echo "Release $TAG is published with all required binaries"
                exit 0
              fi
            fi
            sleep 30
          done
          echo "::error::Release $TAG did not get its binaries within 30 minutes"
          exit 1

  # Build the Tauri menu-bar shell on the self-hosted macOS runner.
  # Replaces the legacy macos-app-zip (Linux assembly of a CLI-only .app)
  # + macos-signed (post-hoc sign of that .app) chain.
  #
  # The Tauri shell IS the user-facing menubar app; the sidecar inside
  # is the same proxy users on Linux/Windows run as a CLI binary. Headless
  # users still get `maximal-<tag>-darwin-arm64.tar.gz` from the binaries
  # matrix in release.yml — this job is purely about the GUI bundle.
  #
  # Required repo secrets (already provisioned for the retired macos-signed):
  #   KEYCHAIN_PASSWORD, DEVELOPER_ID_APPLICATION,
  #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
  tauri-macos:
    needs: ensure-release
    name: macOS Tauri .app + .dmg (signed, arm64)
    runs-on: self-hosted
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      ARCH: arm64
      # GH Actions on self-hosted runs non-login shells that don't read
      # ~/.zshrc — make bun + cargo discoverable for every step.
      BUN_INSTALL: /Users/build/.bun
      CARGO_HOME: /Users/build/.cargo
    steps:
      - uses: actions/checkout@v6

      # Idempotency gate. Installers can be dispatched more than once
      # for the same tag (release.yml's `installers` job, manual
      # re-runs, retries). The macOS bundle is a 60–200 MB Tauri build
      # plus Apple notarization — minutes of work we skip entirely when
      # both signed bundles are already attached to the release. Keyed
      # off the asset actually being present (not a prior run's exit
      # status), so a partial upload still rebuilds. Require BOTH the
      # .app.zip and the .dmg before skipping, since this job produces
      # both from the same build.
      - name: Skip if installers already attached
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          APP_ZIP="maximal-${TAG}-darwin-${ARCH}.app.zip"
          DMG="maximal-${TAG}-darwin-${ARCH}.dmg"
          ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
          if grep -Fxq "$APP_ZIP" <<<"$ASSETS" && grep -Fxq "$DMG" <<<"$ASSETS"; then
            echo "Assets $APP_ZIP and $DMG already attached to $TAG — skipping build + upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "macOS installer bundles not yet present on $TAG — building."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve names + stamp version into tauri.conf.json
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          VERSION="${TAG#v}"
          APP_ZIP="maximal-${TAG}-darwin-${{ env.ARCH }}.app.zip"
          DMG="maximal-${TAG}-darwin-${{ env.ARCH }}.dmg"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "APP_ZIP=${APP_ZIP}" >> "$GITHUB_ENV"
          echo "DMG=${DMG}"         >> "$GITHUB_ENV"

          # Tauri reads version from tauri.conf.json, not git tags. Stamp it.
          /usr/bin/sed -i '' -e "s/\"version\": \"0\\.0\\.0\"/\"version\": \"${VERSION}\"/" \
            shell/src-tauri/tauri.conf.json
          grep '"version"' shell/src-tauri/tauri.conf.json

      - name: Install JS deps
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          bun install
          bun install --cwd shell

      - name: Build sidecar (Bun-compiled proxy)
        if: steps.skip.outputs.skip != 'true'
        env:
          MAXIMAL_FORCE_SIDECAR: "1"
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          bun run app:sidecar
          ls -la shell/src-tauri/binaries/

      - name: Build .app via Tauri
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          cd shell
          bun run tauri build --bundles app
          ls -la src-tauri/target/release/bundle/macos/

      - name: Unlock signing keychain
        if: steps.skip.outputs.skip != 'true'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$HOME/Library/Keychains/maximal.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC"

      - name: Sign .app with Developer ID
        if: steps.skip.outputs.skip != 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          APP="shell/src-tauri/target/release/bundle/macos/Maximal.app"
          codesign --force --deep --options runtime --timestamp \
            --identifier co.stuffbucket.maximal \
            --entitlements build/macos/maximal.entitlements \
            --sign "$SIGN_IDENTITY" \
            "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarize + staple .app
        if: steps.skip.outputs.skip != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="shell/src-tauri/target/release/bundle/macos/Maximal.app"
          NOTARY_ZIP="$(mktemp -d)/notary.zip"
          ditto -c -k --keepParent "$APP" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          spctl -a -t exec --context context:primary-signature -v "$APP"

      - name: Re-zip signed .app
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p dist-release
          APP="shell/src-tauri/target/release/bundle/macos/Maximal.app"
          OUT="dist-release/${APP_ZIP}"
          ditto -c -k --keepParent "$APP" "$OUT"
          (cd dist-release && shasum -a 256 "${APP_ZIP}" > "${APP_ZIP}.sha256")

      - name: Stage DMG layout
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/dmg-stage"
          mkdir -p "$STAGE"
          cp -R shell/src-tauri/target/release/bundle/macos/Maximal.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Build + sign DMG
        if: steps.skip.outputs.skip != 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          OUT="dist-release/${DMG}"
          hdiutil create \
            -volname "Maximal" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "$OUT"
          codesign --force --sign "$SIGN_IDENTITY" "$OUT"
          codesign --verify --verbose=2 "$OUT"

      - name: Notarize + staple DMG
        if: steps.skip.outputs.skip != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          OUT="dist-release/${DMG}"
          xcrun notarytool submit "$OUT" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$OUT"
          xcrun stapler validate "$OUT"
          spctl -a -t open --context context:primary-signature -v "$OUT"
          (cd dist-release && shasum -a 256 "${DMG}" > "${DMG}.sha256")

      - name: Attach signed bundles to release
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/${{ env.APP_ZIP }}
            dist-release/${{ env.APP_ZIP }}.sha256
            dist-release/${{ env.DMG }}
            dist-release/${{ env.DMG }}.sha256

  windows-installer:
    needs: ensure-release
    name: Windows installer (PowerShell)
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6

      # Idempotency gate — see tauri-macos for the full rationale.
      # Cheap here (install.ps1 is copied verbatim), but skipping still
      # avoids a redundant --clobber upload on re-runs.
      - name: Skip if installer already attached
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
          if grep -Fxq "install.ps1" <<<"$ASSETS"; then
            echo "Asset install.ps1 already attached to $TAG — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "install.ps1 not yet present on $TAG — staging."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # B3a ships install.ps1 verbatim — no compilation, no signing for
      # v1 (A4 deferred). Sidecar a SHA-256 so the Pages site (B4) can
      # tell users how to verify before piping into PowerShell.
      - name: Stage installer + sha256
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p dist-release
          cp build/windows/install.ps1 dist-release/install.ps1
          (cd dist-release && shasum -a 256 install.ps1 > install.ps1.sha256)
          ls -la dist-release

      - name: Attach installer to release
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/install.ps1
            dist-release/install.ps1.sha256

  # B3b — Windows MSI built with WiX. Per-user install, no admin
  # required. Same release-attachment contract as the rest of Stream B.
  #
  # WiX is a `dotnet` tool — installed via `dotnet tool install --global
  # wix`. No third-party `uses:` action involved; `dotnet` is
  # preinstalled on the windows-2022 runner image.
  windows-msi:
    needs: ensure-release
    name: Windows MSI (WiX)
    runs-on: windows-2022
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6

      # Idempotency gate — see tauri-macos for the full rationale. The
      # MSI requires a WiX toolchain install + WiX build, so skipping a
      # re-run that already produced the .msi saves real minutes.
      - name: Skip if MSI already attached
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          MSI="maximal-${TAG}-windows-x64.msi"
          ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
          if grep -Fxq "$MSI" <<<"$ASSETS"; then
            echo "Asset $MSI already attached to $TAG — skipping build + upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$MSI not yet present on $TAG — building."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: ver
        if: steps.skip.outputs.skip != 'true'
        shell: bash
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download windows-x64 zip + sha256
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          ZIP="maximal-${TAG}-windows-x64.zip"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ZIP" \
            --pattern "$ZIP.sha256" \
            --dir dist-bin
          echo "Verifying SHA-256"
          ( cd dist-bin && sha256sum -c "$ZIP.sha256" )

      - name: Unpack zip
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem -Path dist-bin -Filter '*.zip' | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath staging -Force
          # Sanity: the zip should contain maximal.exe at its root.
          if (-not (Test-Path 'staging\maximal.exe')) {
            Write-Error "maximal.exe missing from $($zip.Name)"
            exit 1
          }
          Get-ChildItem staging

      - name: Install WiX
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          # Make the wix tool available on PATH for the next step.
          $userBin = Join-Path $env:USERPROFILE '.dotnet\tools'
          echo $userBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$userBin\wix.exe" --version

      - name: Build MSI
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ steps.ver.outputs.version }}'
          $out = "dist-release\maximal-${env:TAG}-windows-x64.msi"
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          # WiX expects the source files referenced by the .wxs (in
          # this case maximal.exe) to be discoverable relative to
          # the working directory or via -bindpath. We stage in
          # `staging/` and pass -bindpath staging.
          wix build build\windows\maximal.wxs `
            -d "Version=$version" `
            -arch x64 `
            -bindpath staging `
            -out $out

      - name: SHA-256
        if: steps.skip.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd dist-release
          sha256sum "maximal-${TAG}-windows-x64.msi" > "maximal-${TAG}-windows-x64.msi.sha256"
          cat "maximal-${TAG}-windows-x64.msi.sha256"

      - name: Attach MSI to release
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/maximal-${{ env.TAG }}-windows-x64.msi
            dist-release/maximal-${{ env.TAG }}-windows-x64.msi.sha256

  # Verify the MSI actually works end-to-end on a clean Windows image:
  # silent install → assert registry/files/PATH → run the installed
  # binary → uninstall → assert clean removal. Only after all of that
  # passes does it attach a `<msi>.verified` sentinel asset, which
  # release.yml's publish gate requires. The pre-existing `smoke` job in
  # release.yml only execs the raw .exe from the zip — it never touched
  # the MSI, so a structurally-broken installer (wrong install dir,
  # missing ARP entry, dirty uninstall) would still ship. This closes
  # that gap. Assertions track build/windows/maximal.wxs: per-user
  # install to %LocalAppData%\Programs\maximal, ARP DisplayName
  # "maximal", HKCU marker Software\stuffbucket\maximal\installed=1, and
  # the install dir added to (and on uninstall removed from) user PATH.
  windows-msi-verify:
    needs: windows-msi
    name: Verify Windows MSI (install + smoke + uninstall)
    runs-on: windows-2022
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Resolve asset name + idempotency gate
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          MSI="maximal-${TAG}-windows-x64.msi"
          echo "msi=$MSI" >> "$GITHUB_OUTPUT"
          ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
          if grep -Fxq "$MSI.verified" <<<"$ASSETS"; then
            echo "$MSI.verified already attached to $TAG — MSI already verified, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download MSI from release
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${{ steps.skip.outputs.msi }}" \
            --dir .
          ls -lh "${{ steps.skip.outputs.msi }}"

      - name: Install MSI silently
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msi = (Resolve-Path "${{ steps.skip.outputs.msi }}").Path
          $log = Join-Path $env:GITHUB_WORKSPACE 'install.log'
          # msiexec is a GUI-subsystem binary: invoked bare it detaches and
          # PowerShell returns 0 regardless. -Wait -PassThru blocks and
          # gives the real exit code. 0 = success; 3010/1641 = success,
          # restart-related (benign under /norestart).
          $p = Start-Process msiexec.exe `
            -ArgumentList "/i `"$msi`" /qn /norestart /l*v `"$log`"" `
            -Wait -PassThru
          Write-Host "msiexec /i exit code: $($p.ExitCode)"
          if ($p.ExitCode -notin @(0, 1641, 3010)) {
            throw "MSI install failed (exit $($p.ExitCode))"
          }

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msi-install-log-${{ env.TAG }}
          path: install.log
          if-no-files-found: ignore

      - name: Verify post-install state
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Binary at the per-user install path (build/windows/maximal.wxs:
          # %LocalAppData%\Programs\maximal\maximal.exe).
          $exe = Join-Path $env:LOCALAPPDATA 'Programs\maximal\maximal.exe'
          if (-not (Test-Path $exe)) { throw "maximal.exe missing at $exe" }
          Write-Host "maximal.exe present ($((Get-Item $exe).Length) bytes)"

          # Add/Remove Programs entry (per-user MSI -> HKCU). Capture the
          # ProductCode for a precise uninstall (it's generated, not in
          # the .wxs, so read it back rather than hard-coding).
          $root = 'HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall'
          $entry = Get-ChildItem $root | Get-ItemProperty |
            Where-Object { $_.DisplayName -eq 'maximal' }
          if (-not $entry) { throw "No 'maximal' Add/Remove Programs entry under HKCU" }
          Write-Host "Registered: $($entry.DisplayName) v$($entry.DisplayVersion) [$($entry.PSChildName)]"
          $entry.PSChildName | Out-File -FilePath (Join-Path $env:GITHUB_WORKSPACE 'productcode.txt') -Encoding ascii -NoNewline

          # HKCU marker written by the StartMenu component.
          $marker = Get-ItemPropertyValue 'HKCU:\Software\stuffbucket\maximal' 'installed' -ErrorAction SilentlyContinue
          if ($marker -ne 1) { throw "HKCU marker Software\stuffbucket\maximal\installed != 1 (got '$marker')" }

          # Install dir added to user PATH (Environment element).
          $userPath = [Environment]::GetEnvironmentVariable('PATH', 'User')
          if ($userPath -notlike '*Programs\maximal*') { throw "install dir not in user PATH: $userPath" }
          Write-Host "post-install state OK"

      - name: Smoke-test installed binary
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Run from the INSTALLED location (not the zip) — proves the MSI
          # placed a working binary. `debug --json` needs no credentials.
          $exe = Join-Path $env:LOCALAPPDATA 'Programs\maximal\maximal.exe'
          & $exe debug --json | Out-File -FilePath debug.json -Encoding utf8
          $j = Get-Content debug.json | ConvertFrom-Json
          foreach ($k in @('version','git','runtime','config','secrets','executor')) {
            if ($null -eq $j.$k) { throw "Missing top-level key in debug --json: $k" }
          }
          Write-Host "installed binary debug --json OK (version=$($j.version))"

      - name: Uninstall MSI silently
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $code = (Get-Content (Join-Path $env:GITHUB_WORKSPACE 'productcode.txt') -Raw).Trim()
          $log = Join-Path $env:GITHUB_WORKSPACE 'uninstall.log'
          $p = Start-Process msiexec.exe `
            -ArgumentList "/x `"$code`" /qn /norestart /l*v `"$log`"" `
            -Wait -PassThru
          Write-Host "msiexec /x exit code: $($p.ExitCode)"
          if ($p.ExitCode -notin @(0, 1641, 3010)) {
            throw "MSI uninstall failed (exit $($p.ExitCode))"
          }

      - name: Upload uninstall log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msi-uninstall-log-${{ env.TAG }}
          path: uninstall.log
          if-no-files-found: ignore

      - name: Verify clean removal
        if: steps.skip.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Join-Path $env:LOCALAPPDATA 'Programs\maximal\maximal.exe'
          if (Test-Path $exe) { throw "maximal.exe still present after uninstall: $exe" }
          $root = 'HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall'
          $entry = Get-ChildItem $root | Get-ItemProperty |
            Where-Object { $_.DisplayName -eq 'maximal' }
          if ($entry) { throw "Add/Remove Programs entry still present after uninstall" }
          if (Test-Path 'HKCU:\Software\stuffbucket\maximal') { throw "HKCU marker key still present after uninstall" }
          Write-Host "clean removal verified"

      # Only reached if every step above succeeded (default if: success()).
      # The sentinel is what release.yml's publish gate waits on.
      - name: Mark MSI verified
        if: steps.skip.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          printf 'verified %s on %s\n' "${{ steps.skip.outputs.msi }}" "$RUNNER_OS" \
            > "dist-release/${{ steps.skip.outputs.msi }}.verified"

      - name: Attach verified sentinel to release
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: dist-release/${{ steps.skip.outputs.msi }}.verified
