# Stream B installer assembly. Runs after Stream A's release workflow
# has published the per-arch tarballs; downloads them, wraps each in a
# .app, zips it, re-attaches the .zip to the same release.
#
# Public-repo policy: no macOS runners. The macOS install path is a
# zipped .app (drag-to-Applications after Finder extract) instead of
# the original .dmg plan. Building a real .dmg needs `hdiutil` which
# is Mac-only; the .app bundle itself is just a directory tree and
# assembles fine on Linux.
#
# Actions policy: first-party `actions/*` only, plus the vendored
# composites under `./.github/actions/`:
#   - setup-bun           (replaces oven-sh/setup-bun)
#   - upload-release-asset (replaces softprops/action-gh-release;
#                           wraps `gh release upload --clobber`)
# No third-party `uses:` references.
#
# Spec: docs/spec/internal-distribution-stream-b.md §7 (B2 macOS .app).

name: Installers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to repackage (e.g. v0.1.0)
        required: true

permissions:
  contents: write
  # Needed by `ensure-release` so it can `gh workflow run release.yml`.
  # Without `actions: write`, the workflow-dispatch API returns 403.
  actions: write

jobs:
  # On `release: published`, the release exists by definition and
  # this job exits in milliseconds. On `workflow_dispatch` against a
  # tag that doesn't yet have a release (or doesn't yet have a tag at
  # all), this job creates the tag from the current ref, pushes it
  # to fire `release.yml`, and waits for the release to be
  # published. Subsequent jobs gate on this one via `needs:`.
  ensure-release:
    name: Ensure release exists
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Ensure tag + release for $TAG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          # No release exists yet → the tag (if any) is orphaned and
          # may point at a stale commit whose workflow files don't
          # match what `gh workflow run` needs. Force-recreate the tag
          # at the current ref so release.yml at the tag is the same
          # version that includes `workflow_dispatch`. Once a release
          # exists, this branch is skipped entirely (early-exit above)
          # and the tag is treated as immutable.
          git fetch --tags origin
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            EXISTING="$(git rev-parse "refs/tags/$TAG")"
            HEAD_SHA="$(git rev-parse HEAD)"
            if [ "$EXISTING" = "$HEAD_SHA" ]; then
              echo "Tag $TAG already at HEAD ($HEAD_SHA); skipping retag"
            else
              echo "Tag $TAG points at $EXISTING but no release exists — retagging at HEAD ($HEAD_SHA)"
              git tag -d "$TAG"
              git push --delete origin "$TAG"
              git tag -a "$TAG" -m "Release $TAG (auto-tagged by installers.yml)"
              git push origin "$TAG"
            fi
          else
            echo "Tag $TAG does not exist — creating from $(git rev-parse --short HEAD)"
            git tag -a "$TAG" -m "Release $TAG (auto-tagged by installers.yml)"
            git push origin "$TAG"
          fi

          # GitHub's anti-loop guard suppresses `push: tags` triggers
          # when the push uses the default GITHUB_TOKEN, so we have to
          # fire release.yml explicitly. The tag ref must already
          # exist on the remote at this point.
          echo "Dispatching release.yml on refs/tags/$TAG ..."
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "refs/tags/$TAG" \
            --field "tag=$TAG"

          # Wait for the release record AND the per-arch binaries.
          # release.yml's `release` job creates the shell record, then
          # the dependent `binaries` job uploads the tarballs/zips
          # several minutes later. The matrix jobs below need the
          # binaries, not just the shell.
          echo "Waiting up to 30 minutes for $TAG release + binaries ..."
          REQUIRED=(
            "maximal-${TAG}-darwin-arm64.tar.gz"
            "maximal-${TAG}-darwin-arm64.tar.gz.sha256"
            "maximal-${TAG}-windows-x64.zip"
            "maximal-${TAG}-windows-x64.zip.sha256"
          )
          for i in $(seq 1 60); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
              MISSING=0
              for f in "${REQUIRED[@]}"; do
                if ! grep -Fxq "$f" <<<"$ASSETS"; then
                  MISSING=1
                  break
                fi
              done
              if [ "$MISSING" = 0 ]; then
                echo "Release $TAG is published with all required binaries"
                exit 0
              fi
            fi
            sleep 30
          done
          echo "::error::Release $TAG did not get its binaries within 30 minutes"
          exit 1

  # Public-repo policy: no macOS runners. Building a real `.dmg`
  # requires `hdiutil` which is Mac-only, so we ship a zipped `.app`
  # bundle instead — same drag-to-Applications UX after one Finder
  # extract step. The `.app` is just a directory tree with specific
  # structure; it assembles fine on Linux.
  macos-app-zip:
    needs: ensure-release
    name: macOS .app.zip (arm64)
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      ARCH: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release artifact URLs
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          TARBALL="maximal-${TAG}-darwin-${{ env.ARCH }}.tar.gz"
          SHA="${TARBALL}.sha256"
          echo "VERSION=${VERSION}"   >> "$GITHUB_ENV"
          echo "TARBALL=${TARBALL}"   >> "$GITHUB_ENV"
          echo "SHA=${SHA}"           >> "$GITHUB_ENV"

      - name: Download tarball + sha256
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist-input
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$TARBALL" \
            --pattern "$SHA" \
            --dir dist-input
          (cd dist-input && sha256sum -c "$SHA")
          mkdir -p dist-input/unpacked
          tar -xzf "dist-input/$TARBALL" -C dist-input/unpacked

      - name: Assemble maximal.app
        run: |
          set -euo pipefail
          BUILD_DIR="dist-build"
          APP="$BUILD_DIR/maximal.app"

          mkdir -p "$BUILD_DIR"
          cp -R build/macos/app-template "$APP"

          # Sentinel substitution in Info.plist (GNU sed).
          sed -i -e "s/__VERSION__/${VERSION}/g" \
            "$APP/Contents/Info.plist"

          BIN_SRC="$(find dist-input/unpacked -maxdepth 2 -type f -name maximal -perm -u+x | head -1)"
          if [ -z "$BIN_SRC" ]; then
            echo "::error::no executable maximal binary found in unpacked tarball"
            exit 1
          fi
          rm -f "$APP/Contents/MacOS/maximal.placeholder"
          cp -f "$BIN_SRC" "$APP/Contents/MacOS/maximal"
          chmod 755 "$APP/Contents/MacOS/maximal"

          rm -f "$APP/Contents/Resources/AppIcon.icns.placeholder"
          if [ -f build/macos/app-template/Contents/Resources/AppIcon.icns ]; then
            cp -f build/macos/app-template/Contents/Resources/AppIcon.icns \
                  "$APP/Contents/Resources/AppIcon.icns"
          fi

          # Stable mtimes so the same source produces a byte-identical zip.
          find "$APP" -exec touch -d '2026-01-01T00:00:00Z' {} +

          ls -la "$APP/Contents/MacOS"
          ls -la "$APP/Contents/Resources"

      - name: Build .app.zip
        run: |
          set -euo pipefail
          OUT_DIR="dist-release"
          mkdir -p "$OUT_DIR"
          ZIP="${OUT_DIR}/maximal-${TAG}-darwin-${{ env.ARCH }}.app.zip"

          # `zip -y` preserves symlinks; `-X` strips extra OS metadata
          # so the archive is reproducible across runners. Macs accept
          # the resulting .app after Archive Utility extraction —
          # there's no Mac-specific resource fork at the bundle level
          # for our binary-only app.
          (cd dist-build && zip -ryX "../${ZIP}" maximal.app)
          (cd "$OUT_DIR" && sha256sum "$(basename "$ZIP")" > "$(basename "$ZIP").sha256")
          ls -la "$OUT_DIR"

      - name: Attach .app.zip to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/maximal-${{ env.TAG }}-darwin-${{ env.ARCH }}.app.zip
            dist-release/maximal-${{ env.TAG }}-darwin-${{ env.ARCH }}.app.zip.sha256

  # Sign the .app + build a signed DMG on the self-hosted Mac runner
  # provisioned with a `maximal.keychain-db` in the runner user's home
  # with the Developer ID cert imported. Sibling project claudeme uses
  # its own `build.keychain-db` on the same runner — keep them
  # independent so a password reset on one doesn't break the other.
  #
  # Notarization is intentionally skipped. Without notarization the
  # first launch still triggers Gatekeeper ("unidentified developer"),
  # but signing avoids the harsher "app is damaged" message that
  # quarantined-and-unsigned apps get, and right-click → Open clears
  # the prompt cleanly. Add notarization later if/when the workflow
  # needs to skip the Gatekeeper prompt entirely.
  #
  # Required repo secrets (configure once at
  # github.com/stuffbucket/maximal/settings/secrets/actions):
  #   KEYCHAIN_PASSWORD        — unlocks ~/Library/Keychains/maximal.keychain-db
  #   DEVELOPER_ID_APPLICATION — full identity string, e.g.
  #                              "Developer ID Application: Name (TEAMID)"
  #
  # Outputs (overwriting the unsigned .app.zip from macos-app-zip):
  #   maximal-${TAG}-darwin-arm64.app.zip   (signed .app, re-zipped)
  #   maximal-${TAG}-darwin-arm64.dmg       (signed DMG, drag-to-Applications)
  #   plus .sha256 sidecars for each
  macos-signed:
    needs: macos-app-zip
    name: macOS signed .app.zip + .dmg
    runs-on: self-hosted
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      ARCH: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve names
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          APP_ZIP="maximal-${TAG}-darwin-${{ env.ARCH }}.app.zip"
          DMG="maximal-${TAG}-darwin-${{ env.ARCH }}.dmg"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "APP_ZIP=${APP_ZIP}" >> "$GITHUB_ENV"
          echo "DMG=${DMG}"         >> "$GITHUB_ENV"

      - name: Download unsigned .app.zip from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf dist-input dist-build dist-release
          mkdir -p dist-input dist-build dist-release
          # Use the REST API + curl rather than `gh` because gh on this
          # runner may be in use by a different agent. This works with
          # any tag whose release contains the unsigned .app.zip.
          ASSET_URL=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); a=[x for x in r['assets'] if x['name']==sys.argv[1]]; print(a[0]['url'] if a else '')" "$APP_ZIP")
          if [ -z "$ASSET_URL" ]; then
            echo "::error::asset $APP_ZIP not found on release $TAG"
            exit 1
          fi
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            -o "dist-input/$APP_ZIP" \
            "$ASSET_URL"
          (cd dist-build && unzip -q "../dist-input/$APP_ZIP")
          ls -la dist-build/maximal.app/Contents/MacOS

      - name: Diag — secret length + hash (temporary)
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          LEN=${#KEYCHAIN_PASSWORD}
          HASH=$(printf '%s' "$KEYCHAIN_PASSWORD" | shasum -a 256 | cut -c1-12)
          echo "secret length=$LEN hash12=$HASH"
          echo "user=$(id -un) uid=$(id -u)"
          echo "HOME=$HOME"
          echo "PWD=$(pwd)"
          KC="$HOME/Library/Keychains/maximal.keychain-db"
          echo "KC=$KC"
          ls -la "$KC" 2>&1 || true
          if [ -f "$KC" ]; then
            FILE_HASH=$(shasum -a 256 "$KC" | cut -c1-16)
            echo "keychain file hash16=$FILE_HASH"
          fi
          echo "--- search list (user) ---"
          security list-keychains -d user
          echo "--- find-identity in KC ---"
          security find-identity -v -p codesigning "$KC" 2>&1 | head -10 || true

      - name: Unlock signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$HOME/Library/Keychains/maximal.keychain-db"
          # Pass via env, not workflow-expression substitution.
          # Inlining a secret into the shell command lets bash reparse
          # it, which mangles passwords containing $, ", \, backtick,
          # or !.
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC"

      - name: Sign .app
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          codesign --force --deep --options runtime --timestamp \
            --entitlements build/macos/maximal.entitlements \
            --sign "$SIGN_IDENTITY" \
            dist-build/maximal.app
          codesign --verify --deep --strict --verbose=2 dist-build/maximal.app

      - name: Re-zip signed .app
        run: |
          set -euo pipefail
          # ditto preserves Mac metadata (extended attributes, the
          # signature blocks inside the .app's _CodeSignature dir,
          # symlinks). zip -ryX would also work for our binary-only
          # bundle but ditto is the canonical Apple-blessed path.
          OUT="dist-release/${APP_ZIP}"
          (cd dist-build && ditto -c -k --keepParent maximal.app "../${OUT}")
          (cd dist-release && shasum -a 256 "${APP_ZIP}" > "${APP_ZIP}.sha256")

      - name: Stage DMG layout
        run: |
          set -euo pipefail
          STAGE="dist-build/dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R dist-build/maximal.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

      - name: Build + sign DMG
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          OUT="dist-release/${DMG}"
          hdiutil create \
            -volname "Maximal" \
            -srcfolder dist-build/dmg-stage \
            -ov -format UDZO \
            "$OUT"
          codesign --force --sign "$SIGN_IDENTITY" "$OUT"
          codesign --verify --verbose=2 "$OUT"
          (cd dist-release && shasum -a 256 "${DMG}" > "${DMG}.sha256")

      - name: Attach signed bundles to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/${{ env.APP_ZIP }}
            dist-release/${{ env.APP_ZIP }}.sha256
            dist-release/${{ env.DMG }}
            dist-release/${{ env.DMG }}.sha256

  windows-installer:
    needs: ensure-release
    name: Windows installer (PowerShell)
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # B3a ships install.ps1 verbatim — no compilation, no signing for
      # v1 (A4 deferred). Sidecar a SHA-256 so the Pages site (B4) can
      # tell users how to verify before piping into PowerShell.
      - name: Stage installer + sha256
        run: |
          set -euo pipefail
          mkdir -p dist-release
          cp build/windows/install.ps1 dist-release/install.ps1
          (cd dist-release && shasum -a 256 install.ps1 > install.ps1.sha256)
          ls -la dist-release

      - name: Attach installer to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/install.ps1
            dist-release/install.ps1.sha256

  # B3b — Windows MSI built with WiX. Per-user install, no admin
  # required. Same release-attachment contract as the rest of Stream B.
  #
  # WiX is a `dotnet` tool — installed via `dotnet tool install --global
  # wix`. No third-party `uses:` action involved; `dotnet` is
  # preinstalled on the windows-2022 runner image.
  windows-msi:
    needs: ensure-release
    name: Windows MSI (WiX)
    runs-on: windows-2022
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download windows-x64 zip + sha256
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          ZIP="maximal-${TAG}-windows-x64.zip"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ZIP" \
            --pattern "$ZIP.sha256" \
            --dir dist-bin
          echo "Verifying SHA-256"
          ( cd dist-bin && sha256sum -c "$ZIP.sha256" )

      - name: Unpack zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem -Path dist-bin -Filter '*.zip' | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath staging -Force
          # Sanity: the zip should contain maximal.exe at its root.
          if (-not (Test-Path 'staging\maximal.exe')) {
            Write-Error "maximal.exe missing from $($zip.Name)"
            exit 1
          }
          Get-ChildItem staging

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          # Make the wix tool available on PATH for the next step.
          $userBin = Join-Path $env:USERPROFILE '.dotnet\tools'
          echo $userBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$userBin\wix.exe" --version

      - name: Build MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ steps.ver.outputs.version }}'
          $out = "dist-release\maximal-${env:TAG}-windows-x64.msi"
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          # WiX expects the source files referenced by the .wxs (in
          # this case maximal.exe) to be discoverable relative to
          # the working directory or via -bindpath. We stage in
          # `staging/` and pass -bindpath staging.
          wix build build\windows\maximal.wxs `
            -d "Version=$version" `
            -arch x64 `
            -bindpath staging `
            -out $out

      - name: SHA-256
        shell: bash
        run: |
          set -euo pipefail
          cd dist-release
          sha256sum "maximal-${TAG}-windows-x64.msi" > "maximal-${TAG}-windows-x64.msi.sha256"
          cat "maximal-${TAG}-windows-x64.msi.sha256"

      - name: Attach MSI to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/maximal-${{ env.TAG }}-windows-x64.msi
            dist-release/maximal-${{ env.TAG }}-windows-x64.msi.sha256
