# Stream B installer assembly. Runs after Stream A's release workflow
# has published the per-arch tarballs; downloads them, wraps each in a
# .app + .dmg, re-attaches the .dmg to the same release.
#
# Actions policy: first-party `actions/*` only, plus the vendored
# composites under `./.github/actions/`:
#   - setup-bun           (replaces oven-sh/setup-bun)
#   - upload-release-asset (replaces softprops/action-gh-release;
#                           wraps `gh release upload --clobber`)
# No third-party `uses:` references. `npx create-dmg` is an npm
# package, not a GHA, and is fine.
#
# Spec: docs/spec/internal-distribution-stream-b.md §7 (B2 macOS DMG).

name: installers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to repackage (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # We do not run bun in this job (no JS/TS execution), but
      # leave the vendored composite registered as a comment for
      # the Windows installer job below — same pattern.

      - name: Resolve release artifact URLs
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          TARBALL="copilot-api-${TAG}-darwin-${{ matrix.arch }}.tar.gz"
          SHA="${TARBALL}.sha256"
          echo "VERSION=${VERSION}"   >> "$GITHUB_ENV"
          echo "TARBALL=${TARBALL}"   >> "$GITHUB_ENV"
          echo "SHA=${SHA}"           >> "$GITHUB_ENV"

      - name: Download tarball + sha256
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist-input
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$TARBALL" \
            --pattern "$SHA" \
            --dir dist-input
          (cd dist-input && shasum -a 256 -c "$SHA")
          mkdir -p dist-input/unpacked
          tar -xzf "dist-input/$TARBALL" -C dist-input/unpacked

      - name: Assemble copilot-api.app
        run: |
          set -euo pipefail
          BUILD_DIR="dist-build"
          APP="$BUILD_DIR/copilot-api.app"

          mkdir -p "$BUILD_DIR"
          cp -R build/macos/app-template "$APP"

          # Sentinel substitution in Info.plist.
          sed -i '' -e "s/__VERSION__/${VERSION}/g" \
            "$APP/Contents/Info.plist"

          # Replace the binary placeholder with the real one. The
          # tarball layout from Stream A is a single binary at the
          # root after extraction.
          BIN_SRC="$(find dist-input/unpacked -maxdepth 2 -type f -name copilot-api -perm -u+x | head -1)"
          if [ -z "$BIN_SRC" ]; then
            echo "::error::no executable copilot-api binary found in unpacked tarball"
            exit 1
          fi
          rm -f "$APP/Contents/MacOS/copilot-api.placeholder"
          cp -f "$BIN_SRC" "$APP/Contents/MacOS/copilot-api"
          chmod 755 "$APP/Contents/MacOS/copilot-api"

          # Real icon if a designer has dropped it in alongside the
          # placeholder. The placeholder file is never copied into
          # the shipped .app.
          rm -f "$APP/Contents/Resources/AppIcon.icns.placeholder"
          if [ -f build/macos/app-template/Contents/Resources/AppIcon.icns ]; then
            cp -f build/macos/app-template/Contents/Resources/AppIcon.icns \
                  "$APP/Contents/Resources/AppIcon.icns"
          fi

          # Touch every nested file so tar/zip preserves mtimes
          # consistently across runners.
          find "$APP" -exec touch -d '2026-01-01T00:00:00Z' {} +

          ls -la "$APP/Contents/MacOS"
          ls -la "$APP/Contents/Resources"

      - name: Build DMG
        run: |
          set -euo pipefail
          OUT_DIR="dist-release"
          mkdir -p "$OUT_DIR"

          # Use the real DMG background if a designer has dropped it
          # in; otherwise fall back to create-dmg's default template.
          BG_ARG=""
          if [ -f build/macos/dmg-bg.png ]; then
            BG_ARG="--background=build/macos/dmg-bg.png"
          fi

          # create-dmg is npm-installed and run via npx — not a GHA,
          # so the actions policy doesn't apply.
          npx --yes create-dmg \
            "dist-build/copilot-api.app" \
            "$OUT_DIR" \
            ${BG_ARG} \
            --dmg-title="copilot-api ${VERSION}" \
            --identity="" \
            || true

          # create-dmg names the file `copilot-api ${VERSION}.dmg`
          # (with a space). Rename to our canonical artifact name.
          ORIG="$(ls "$OUT_DIR"/*.dmg | head -1)"
          if [ -z "$ORIG" ]; then
            echo "::error::create-dmg did not produce a .dmg in $OUT_DIR"
            exit 1
          fi
          DEST="$OUT_DIR/copilot-api-${TAG}-darwin-${{ matrix.arch }}.dmg"
          mv -f "$ORIG" "$DEST"

          # SHA-256 alongside the .dmg, matching Stream A's tarball
          # SHA convention so the Pages site can verify either.
          (cd "$OUT_DIR" && shasum -a 256 "$(basename "$DEST")" > "$(basename "$DEST").sha256")
          ls -la "$OUT_DIR"

      - name: Attach DMG to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/copilot-api-${{ env.TAG }}-darwin-${{ matrix.arch }}.dmg
            dist-release/copilot-api-${{ env.TAG }}-darwin-${{ matrix.arch }}.dmg.sha256

  windows-installer:
    name: Windows installer (PowerShell)
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # B3a ships install.ps1 verbatim — no compilation, no signing for
      # v1 (A4 deferred). Sidecar a SHA-256 so the Pages site (B4) can
      # tell users how to verify before piping into PowerShell.
      - name: Stage installer + sha256
        run: |
          set -euo pipefail
          mkdir -p dist-release
          cp build/windows/install.ps1 dist-release/install.ps1
          (cd dist-release && shasum -a 256 install.ps1 > install.ps1.sha256)
          ls -la dist-release

      - name: Attach installer to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/install.ps1
            dist-release/install.ps1.sha256

  # B3b — Windows MSI built with WiX. Per-user install, no admin
  # required. Same release-attachment contract as the rest of Stream B.
  #
  # WiX is a `dotnet` tool — installed via `dotnet tool install --global
  # wix`. No third-party `uses:` action involved; `dotnet` is
  # preinstalled on the windows-2022 runner image.
  windows-msi:
    name: Windows MSI (WiX)
    runs-on: windows-2022
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download windows-x64 zip + sha256
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          ZIP="copilot-api-${TAG}-windows-x64.zip"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ZIP" \
            --pattern "$ZIP.sha256" \
            --dir dist-bin
          echo "Verifying SHA-256"
          ( cd dist-bin && sha256sum -c "$ZIP.sha256" )

      - name: Unpack zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem -Path dist-bin -Filter '*.zip' | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath staging -Force
          # Sanity: the zip should contain copilot-api.exe at its root.
          if (-not (Test-Path 'staging\copilot-api.exe')) {
            Write-Error "copilot-api.exe missing from $($zip.Name)"
            exit 1
          }
          Get-ChildItem staging

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          # Make the wix tool available on PATH for the next step.
          $userBin = Join-Path $env:USERPROFILE '.dotnet\tools'
          echo $userBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$userBin\wix.exe" --version

      - name: Build MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ steps.ver.outputs.version }}'
          $out = "dist-release\copilot-api-${env:TAG}-windows-x64.msi"
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          # WiX expects the source files referenced by the .wxs (in
          # this case copilot-api.exe) to be discoverable relative to
          # the working directory or via -bindpath. We stage in
          # `staging/` and pass -bindpath staging.
          wix build build\windows\copilot-api.wxs `
            -d "Version=$version" `
            -arch x64 `
            -bindpath staging `
            -out $out

      - name: SHA-256
        shell: bash
        run: |
          set -euo pipefail
          cd dist-release
          sha256sum "copilot-api-${TAG}-windows-x64.msi" > "copilot-api-${TAG}-windows-x64.msi.sha256"
          cat "copilot-api-${TAG}-windows-x64.msi.sha256"

      - name: Attach MSI to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/copilot-api-${{ env.TAG }}-windows-x64.msi
            dist-release/copilot-api-${{ env.TAG }}-windows-x64.msi.sha256
