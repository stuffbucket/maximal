# Stream B installer assembly. Runs after Stream A's release workflow
# has published the per-arch tarballs; downloads them, wraps each in a
# .app, zips it, re-attaches the .zip to the same release.
#
# Public-repo policy: no macOS runners. The macOS install path is a
# zipped .app (drag-to-Applications after Finder extract) instead of
# the original .dmg plan. Building a real .dmg needs `hdiutil` which
# is Mac-only; the .app bundle itself is just a directory tree and
# assembles fine on Linux.
#
# Actions policy: first-party `actions/*` only, plus the vendored
# composites under `./.github/actions/`:
#   - setup-bun           (replaces oven-sh/setup-bun)
#   - upload-release-asset (replaces softprops/action-gh-release;
#                           wraps `gh release upload --clobber`)
# No third-party `uses:` references.
#
# Spec: docs/spec/archive/internal-distribution-stream-b.md §7 (B2 macOS .app).

name: Installers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to repackage (e.g. v0.1.0)
        required: true

permissions:
  contents: write
  # Needed by `ensure-release` so it can `gh workflow run release.yml`.
  # Without `actions: write`, the workflow-dispatch API returns 403.
  actions: write

jobs:
  # On `release: published`, the release exists by definition and
  # this job exits in milliseconds. On `workflow_dispatch` against a
  # tag that doesn't yet have a release (or doesn't yet have a tag at
  # all), this job creates the tag from the current ref, pushes it
  # to fire `release.yml`, and waits for the release to be
  # published. Subsequent jobs gate on this one via `needs:`.
  ensure-release:
    name: Ensure release exists
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Ensure tag + release for $TAG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          # No release exists yet → the tag (if any) is orphaned and
          # may point at a stale commit whose workflow files don't
          # match what `gh workflow run` needs. Force-recreate the tag
          # at the current ref so release.yml at the tag is the same
          # version that includes `workflow_dispatch`. Once a release
          # exists, this branch is skipped entirely (early-exit above)
          # and the tag is treated as immutable.
          git fetch --tags origin
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            EXISTING="$(git rev-parse "refs/tags/$TAG")"
            HEAD_SHA="$(git rev-parse HEAD)"
            if [ "$EXISTING" = "$HEAD_SHA" ]; then
              echo "Tag $TAG already at HEAD ($HEAD_SHA); skipping retag"
            else
              echo "Tag $TAG points at $EXISTING but no release exists — retagging at HEAD ($HEAD_SHA)"
              git tag -d "$TAG"
              git push --delete origin "$TAG"
              git tag -a "$TAG" -m "Release $TAG (auto-tagged by installers.yml)"
              git push origin "$TAG"
            fi
          else
            echo "Tag $TAG does not exist — creating from $(git rev-parse --short HEAD)"
            git tag -a "$TAG" -m "Release $TAG (auto-tagged by installers.yml)"
            git push origin "$TAG"
          fi

          # GitHub's anti-loop guard suppresses `push: tags` triggers
          # when the push uses the default GITHUB_TOKEN, so we have to
          # fire release.yml explicitly. The tag ref must already
          # exist on the remote at this point.
          echo "Dispatching release.yml on refs/tags/$TAG ..."
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "refs/tags/$TAG" \
            --field "tag=$TAG"

          # Wait for the release record AND the per-arch binaries.
          # release.yml's `release` job creates the shell record, then
          # the dependent `binaries` job uploads the tarballs/zips
          # several minutes later. The matrix jobs below need the
          # binaries, not just the shell.
          echo "Waiting up to 30 minutes for $TAG release + binaries ..."
          REQUIRED=(
            "maximal-${TAG}-darwin-arm64.tar.gz"
            "maximal-${TAG}-darwin-arm64.tar.gz.sha256"
            "maximal-${TAG}-windows-x64.zip"
            "maximal-${TAG}-windows-x64.zip.sha256"
          )
          for i in $(seq 1 60); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo '')"
              MISSING=0
              for f in "${REQUIRED[@]}"; do
                if ! grep -Fxq "$f" <<<"$ASSETS"; then
                  MISSING=1
                  break
                fi
              done
              if [ "$MISSING" = 0 ]; then
                echo "Release $TAG is published with all required binaries"
                exit 0
              fi
            fi
            sleep 30
          done
          echo "::error::Release $TAG did not get its binaries within 30 minutes"
          exit 1

  # Build the Tauri menu-bar shell on the self-hosted macOS runner.
  # Replaces the legacy macos-app-zip (Linux assembly of a CLI-only .app)
  # + macos-signed (post-hoc sign of that .app) chain.
  #
  # The Tauri shell IS the user-facing menubar app; the sidecar inside
  # is the same proxy users on Linux/Windows run as a CLI binary. Headless
  # users still get `maximal-<tag>-darwin-arm64.tar.gz` from the binaries
  # matrix in release.yml — this job is purely about the GUI bundle.
  #
  # Required repo secrets (already provisioned for the retired macos-signed):
  #   KEYCHAIN_PASSWORD, DEVELOPER_ID_APPLICATION,
  #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
  tauri-macos:
    needs: ensure-release
    name: macOS Tauri .app + .dmg (signed, arm64)
    runs-on: self-hosted
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      ARCH: arm64
      # GH Actions on self-hosted runs non-login shells that don't read
      # ~/.zshrc — make bun + cargo discoverable for every step.
      BUN_INSTALL: /Users/build/.bun
      CARGO_HOME: /Users/build/.cargo
    steps:
      - uses: actions/checkout@v6

      - name: Resolve names + stamp version into tauri.conf.json
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          VERSION="${TAG#v}"
          APP_ZIP="maximal-${TAG}-darwin-${{ env.ARCH }}.app.zip"
          DMG="maximal-${TAG}-darwin-${{ env.ARCH }}.dmg"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "APP_ZIP=${APP_ZIP}" >> "$GITHUB_ENV"
          echo "DMG=${DMG}"         >> "$GITHUB_ENV"

          # Tauri reads version from tauri.conf.json, not git tags. Stamp it.
          /usr/bin/sed -i '' -e "s/\"version\": \"0\\.0\\.0\"/\"version\": \"${VERSION}\"/" \
            shell/src-tauri/tauri.conf.json
          grep '"version"' shell/src-tauri/tauri.conf.json

      - name: Install JS deps
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          bun install
          bun install --cwd shell

      - name: Build sidecar (Bun-compiled proxy)
        env:
          MAXIMAL_FORCE_SIDECAR: "1"
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          bun run app:sidecar
          ls -la shell/src-tauri/binaries/

      - name: Build .app via Tauri
        run: |
          set -euo pipefail
          export PATH="$BUN_INSTALL/bin:$CARGO_HOME/bin:$PATH"
          cd shell
          bun run tauri build --bundles app
          ls -la src-tauri/target/release/bundle/macos/

      - name: Unlock signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$HOME/Library/Keychains/maximal.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC"

      - name: Sign .app with Developer ID
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          APP="shell/src-tauri/target/release/bundle/macos/Maximal.app"
          codesign --force --deep --options runtime --timestamp \
            --identifier co.stuffbucket.maximal \
            --entitlements build/macos/maximal.entitlements \
            --sign "$SIGN_IDENTITY" \
            "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarize + staple .app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="shell/src-tauri/target/release/bundle/macos/Maximal.app"
          NOTARY_ZIP="$(mktemp -d)/notary.zip"
          ditto -c -k --keepParent "$APP" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          spctl -a -t exec --context context:primary-signature -v "$APP"

      - name: Re-zip signed .app
        run: |
          set -euo pipefail
          mkdir -p dist-release
          APP="shell/src-tauri/target/release/bundle/macos/Maximal.app"
          OUT="dist-release/${APP_ZIP}"
          ditto -c -k --keepParent "$APP" "$OUT"
          (cd dist-release && shasum -a 256 "${APP_ZIP}" > "${APP_ZIP}.sha256")

      - name: Stage DMG layout
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/dmg-stage"
          mkdir -p "$STAGE/.background"
          cp -R shell/src-tauri/target/release/bundle/macos/Maximal.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          # Branded Finder background (HiDPI TIFF). Regenerate from the
          # SVG with shell/src-tauri/dmg/build-background.sh.
          cp shell/src-tauri/dmg/background.tiff "$STAGE/.background/background.tiff"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Build + sign DMG
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          OUT="dist-release/${DMG}"

          # Build a read-WRITE image first so Finder can lay it out
          # (window size, icon positions, background), then convert to a
          # compressed read-only DMG. A plain `hdiutil create -format
          # UDZO` can't be styled — it ships an unproportioned default
          # window with icons placed wherever Finder feels like.
          RW="$(mktemp -d)/rw.dmg"
          hdiutil create \
            -volname "Maximal" \
            -srcfolder "$STAGE" \
            -fs HFS+ -format UDRW -ov \
            "$RW"

          DEV="$(hdiutil attach -readwrite -noverify -noautoopen "$RW" \
            | grep -E '^/dev/' | head -1 | awk '{print $1}')"
          # Let the volume settle before scripting Finder against it.
          sleep 2

          # Finder layout — coordinates mirror shell/src-tauri/dmg/
          # background.svg. Best-effort: AppleScript needs a GUI (window
          # server) session on the runner. If the runner is headless the
          # layout no-ops and we ship a functional, unstyled DMG rather
          # than failing the release.
          osascript <<'APPLESCRIPT' || echo "::warning::DMG Finder layout failed (headless runner?) — shipping unstyled DMG"
          tell application "Finder"
            tell disk "Maximal"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {400, 120, 1060, 540}
              set theViewOptions to the icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 128
              set background picture of theViewOptions to file ".background:background.tiff"
              set position of item "Maximal.app" of container window to {180, 210}
              set position of item "Applications" of container window to {480, 210}
              update without registering applications
              delay 1
              close
            end tell
          end tell
          APPLESCRIPT

          sync
          hdiutil detach "$DEV"
          hdiutil convert "$RW" -format UDZO -imagekey zlib-level=9 -ov -o "$OUT"
          codesign --force --sign "$SIGN_IDENTITY" "$OUT"
          codesign --verify --verbose=2 "$OUT"

      - name: Notarize + staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          OUT="dist-release/${DMG}"
          xcrun notarytool submit "$OUT" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$OUT"
          xcrun stapler validate "$OUT"
          spctl -a -t open --context context:primary-signature -v "$OUT"
          (cd dist-release && shasum -a 256 "${DMG}" > "${DMG}.sha256")

      - name: Attach signed bundles to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/${{ env.APP_ZIP }}
            dist-release/${{ env.APP_ZIP }}.sha256
            dist-release/${{ env.DMG }}
            dist-release/${{ env.DMG }}.sha256

  windows-installer:
    needs: ensure-release
    name: Windows installer (PowerShell)
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6

      # B3a ships install.ps1 verbatim — no compilation, no signing for
      # v1 (A4 deferred). Sidecar a SHA-256 so the Pages site (B4) can
      # tell users how to verify before piping into PowerShell.
      - name: Stage installer + sha256
        run: |
          set -euo pipefail
          mkdir -p dist-release
          cp build/windows/install.ps1 dist-release/install.ps1
          (cd dist-release && shasum -a 256 install.ps1 > install.ps1.sha256)
          ls -la dist-release

      - name: Attach installer to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/install.ps1
            dist-release/install.ps1.sha256

  # B3b — Windows MSI built with WiX. Per-user install, no admin
  # required. Same release-attachment contract as the rest of Stream B.
  #
  # WiX is a `dotnet` tool — installed via `dotnet tool install --global
  # wix`. No third-party `uses:` action involved; `dotnet` is
  # preinstalled on the windows-2022 runner image.
  windows-msi:
    needs: ensure-release
    name: Windows MSI (WiX)
    runs-on: windows-2022
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download windows-x64 zip + sha256
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          ZIP="maximal-${TAG}-windows-x64.zip"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ZIP" \
            --pattern "$ZIP.sha256" \
            --dir dist-bin
          echo "Verifying SHA-256"
          ( cd dist-bin && sha256sum -c "$ZIP.sha256" )

      - name: Unpack zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem -Path dist-bin -Filter '*.zip' | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath staging -Force
          # Sanity: the zip should contain maximal.exe at its root.
          if (-not (Test-Path 'staging\maximal.exe')) {
            Write-Error "maximal.exe missing from $($zip.Name)"
            exit 1
          }
          Get-ChildItem staging

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          # Make the wix tool available on PATH for the next step.
          $userBin = Join-Path $env:USERPROFILE '.dotnet\tools'
          echo $userBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$userBin\wix.exe" --version

      - name: Build MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ steps.ver.outputs.version }}'
          $out = "dist-release\maximal-${env:TAG}-windows-x64.msi"
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          # WiX expects the source files referenced by the .wxs (in
          # this case maximal.exe) to be discoverable relative to
          # the working directory or via -bindpath. We stage in
          # `staging/` and pass -bindpath staging.
          wix build build\windows\maximal.wxs `
            -d "Version=$version" `
            -arch x64 `
            -bindpath staging `
            -out $out

      - name: SHA-256
        shell: bash
        run: |
          set -euo pipefail
          cd dist-release
          sha256sum "maximal-${TAG}-windows-x64.msi" > "maximal-${TAG}-windows-x64.msi.sha256"
          cat "maximal-${TAG}-windows-x64.msi.sha256"

      - name: Attach MSI to release
        uses: ./.github/actions/upload-release-asset
        with:
          tag: ${{ env.TAG }}
          files: |
            dist-release/maximal-${{ env.TAG }}-windows-x64.msi
            dist-release/maximal-${{ env.TAG }}-windows-x64.msi.sha256
